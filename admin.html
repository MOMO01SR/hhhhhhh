<!DOCTYPE html>
<html lang="ar" dir="rtl" translate="no">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="google" content="notranslate" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net https://*.supabase.co" />
    <meta name="theme-color" content="#020617" />
    <title>POP Capital | لوحة التحكم الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        :root {
            --primary: #06b6d4;
            --accent: #10b981;
            --dark: #020617;
            --danger: #ef4444;
            --purple: #a855f7;
            --warning: #f59e0b;
            --surface: rgba(15, 23, 42, 0.85);
        }
        * {
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark);
            color: #e2e8f0;
            margin: 0;
            padding: 1rem;
            min-height: 100vh;
            background-image: radial-gradient(circle at 10% 15%, rgba(6, 182, 212, 0.07), transparent 40%),
                radial-gradient(circle at 90% 85%, rgba(16, 185, 129, 0.05), transparent 40%);
        }
        .glass {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.92), rgba(2, 6, 15, 0.96));
            backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }
        .glass-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
            margin-bottom: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .btn {
            padding: 0.55rem 1.2rem;
            border-radius: 0.65rem;
            font-weight: 800;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }
        .btn-sm {
            padding: 0.25rem 0.6rem;
            font-size: 0.6rem;
            gap: 0.2rem;
        }
        .btn-primary {
            background: linear-gradient(90deg, #06b6d4, #2563eb);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.3);
        }
        .btn-success {
            background: linear-gradient(90deg, #10b981, #059669);
            color: #fff;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        .btn-warning {
            background: #f59e0b;
            color: #000;
        }
        .btn-warning:hover {
            background: #d97706;
            transform: translateY(-2px);
        }
        .btn-info {
            background: #3b82f6;
            color: #fff;
        }
        .btn-info:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #94a3b8;
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .btn-purple {
            background: linear-gradient(90deg, #a855f7, #7c3aed);
            color: #fff;
        }
        .btn-purple:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
        }
        .input-field {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
            padding: 0.6rem 0.8rem;
            border-radius: 0.6rem;
            font-family: monospace;
            width: 100%;
            margin: 0.2rem 0;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
        }
        .input-field::placeholder {
            color: #475569;
        }
        .tab-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.6rem;
            font-weight: 800;
            font-size: 0.7rem;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }
        .tab-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.25);
        }
        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 0.5rem;
            font-size: 0.6rem;
            font-weight: 800;
            display: inline-block;
        }
        .badge-pending {
            background: rgba(245, 158, 11, 0.18);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
        .badge-approved {
            background: rgba(16, 185, 129, 0.18);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .badge-rejected {
            background: rgba(239, 68, 68, 0.18);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .badge-completed {
            background: rgba(59, 130, 246, 0.18);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .badge-inactive {
            background: rgba(100, 116, 139, 0.18);
            color: #64748b;
            border: 1px solid rgba(100, 116, 139, 0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
        }
        th,
        td {
            padding: 0.5rem 0.4rem;
            text-align: right;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            vertical-align: middle;
        }
        th {
            color: var(--primary);
            font-weight: 900;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            background: rgba(2, 6, 23, 0.95);
            z-index: 5;
        }
        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.2rem;
            padding: 0.3rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .tab-content {
            display: none;
            animation: fadeSlide 0.35s ease forwards;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.8rem;
        }
        .grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 0.8rem;
        }
        .search-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 0.8rem;
            padding: 0.4rem 0.8rem;
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            align-items: center;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: #e2e8f0;
            width: 100%;
            outline: none;
            font-family: monospace;
            font-size: 0.75rem;
        }
        .search-box input::placeholder {
            color: #475569;
        }
        .overflow-table {
            overflow-x: auto;
            max-height: 550px;
            overflow-y: auto;
            border-radius: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .overflow-table::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .overflow-table::-webkit-scrollbar-thumb {
            background: rgba(6, 182, 212, 0.3);
            border-radius: 10px;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .modal-box {
            background: linear-gradient(145deg, #0f172a, #020617);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            width: 100%;
            max-width: 540px;
            padding: 2rem;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.95) translateY(10px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.active .modal-box {
            transform: scale(1) translateY(0);
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-close:hover {
            color: #fff;
            transform: rotate(90deg);
        }
        .stat-mini {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 0.8rem;
            padding: 0.8rem 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .stat-mini .num {
            font-family: monospace;
            font-weight: 900;
            font-size: 1.4rem;
        }
        .empty-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #64748b;
        }
        .empty-state svg {
            opacity: 0.3;
            margin-bottom: 0.8rem;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(16, 185, 129, 0.95);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #fff;
            padding: 0.8rem 1.5rem;
            border-radius: 1rem;
            font-weight: 800;
            font-size: 0.85rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            z-index: 99999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .toast.error {
            background: rgba(239, 68, 68, 0.95);
            border-color: rgba(239, 68, 68, 0.3);
        }
        .toast.warning {
            background: rgba(245, 158, 11, 0.95);
            border-color: rgba(245, 158, 11, 0.3);
            color: #000;
        }
        @media (max-width: 640px) {
            .grid-2,
            .grid-3,
            .grid-4 {
                grid-template-columns: 1fr;
            }
            .glass {
                padding: 1rem;
            }
            .tabs-container {
                gap: 0.25rem;
            }
            .tab-btn {
                font-size: 0.6rem;
                padding: 0.35rem 0.6rem;
            }
            .btn {
                font-size: 0.6rem;
                padding: 0.35rem 0.7rem;
            }
            .modal-box {
                padding: 1.5rem;
            }
        }
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(6, 182, 212, 0.25);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(6, 182, 212, 0.4);
        }
    </style>
</head>
<body class="max-w-7xl mx-auto">

    <!-- Toast -->
    <div id="toast" class="toast"><span id="toastMsg">✅ تم!</span></div>

    <!-- مودال تعديل المستخدم -->
    <div id="userModal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('userModal')">✕</button>
            <h3 class="text-lg font-black text-cyan-400 mb-4 flex items-center gap-2">✏️ تعديل المستخدم</h3>
            <div id="userEditForm"></div>
        </div>
    </div>

    <!-- مودال تفاصيل الإيداع -->
    <div id="depositModal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('depositModal')">✕</button>
            <h3 class="text-lg font-black text-cyan-400 mb-4 flex items-center gap-2">📥 تفاصيل الإيداع</h3>
            <div id="depositDetailContent"></div>
        </div>
    </div>

    <!-- مودال إضافة / تعديل خطة -->
    <div id="planModal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('planModal')">✕</button>
            <h3 class="text-lg font-black text-cyan-400 mb-4 flex items-center gap-2" id="planModalTitle">📊 إضافة خطة</h3>
            <div id="planEditForm"></div>
        </div>
    </div>

    <!-- ====== HEADER ====== -->
    <header class="flex flex-wrap justify-between items-center gap-3 mb-5">
        <div>
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-purple-200 to-purple-500 tracking-tight">🛡️ ADMIN NODE</h1>
            <p class="text-[10px] text-gray-500 font-mono tracking-widest uppercase">Quantum Control Panel v3.0</p>
        </div>
        <div class="flex items-center gap-3 flex-wrap">
            <button onclick="location.reload()" class="btn btn-primary">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                تحديث
            </button>
            <span class="text-[10px] text-emerald-400 font-mono flex items-center gap-1.5 bg-emerald-950/30 px-3 py-1.5 rounded-full border border-emerald-500/20">
                <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                LIVE
            </span>
        </div>
    </header>

    <!-- ====== TABS ====== -->
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="users">👥 المستخدمين</button>
        <button class="tab-btn" data-tab="deposits">📥 الإيداعات</button>
        <button class="tab-btn" data-tab="withdrawals">💸 السحوبات</button>
        <button class="tab-btn" data-tab="investments">📋 الاستثمارات</button>
        <button class="tab-btn" data-tab="plans">📊 الخطط</button>
        <button class="tab-btn" data-tab="daily">🎁 المكافآت</button>
        <button class="tab-btn" data-tab="referral">👥 الإحالة</button>
        <button class="tab-btn" data-tab="networks">🌐 الشبكات</button>
        <button class="tab-btn" data-tab="general">⚙️ الإعدادات</button>
    </div>

    <!-- ====== TAB CONTENT CONTAINERS ====== -->
    <div class="tab-content active" id="tab-users"></div>
    <div class="tab-content" id="tab-deposits"></div>
    <div class="tab-content" id="tab-withdrawals"></div>
    <div class="tab-content" id="tab-investments"></div>
    <div class="tab-content" id="tab-plans"></div>
    <div class="tab-content" id="tab-daily"></div>
    <div class="tab-content" id="tab-referral"></div>
    <div class="tab-content" id="tab-networks"></div>
    <div class="tab-content" id="tab-general"></div>

    <script>
        // ============================================================
        //  SUPABASE CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://aqoufnmdhopmdobknczg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_BvmWY2L-ZfwkZloJ_uPaDw_9wTq84D-';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================================
        //  GLOBAL STATE
        // ============================================================
        let allUsers = [];
        let allDeposits = [];
        let allWithdrawals = [];
        let allInvestments = [];
        let allPlans = [];
        let allSettings = [];

        // ============================================================
        //  HELPERS
        // ============================================================
        function formatDate(d) {
            if (!d) return '-';
            const dt = new Date(d);
            return dt.toLocaleDateString('ar-EG') + ' ' + dt.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        }

        function formatUSD(n) {
            return '$' + parseFloat(n || 0).toFixed(2);
        }

        function short(str, len = 10) {
            if (!str) return '-';
            return str.length > len ? str.slice(0, len) + '…' : str;
        }

        function getSetting(key, def = '') {
            const s = allSettings.find(x => x.key === key);
            return s ? s.value : def;
        }

        async function hashText(t) {
            if (!t) return '';
            const e = new TextEncoder();
            const h = await crypto.subtle.digest('SHA-256', e.encode(t));
            return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function showToast(msg, type = 'success') {
            const el = document.getElementById('toast');
            const msgEl = document.getElementById('toastMsg');
            msgEl.textContent = msg;
            el.className = 'toast';
            if (type === 'error') el.classList.add('error');
            else if (type === 'warning') el.classList.add('warning');
            el.classList.add('show');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), 3000);
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        // ============================================================
        //  TAB SWITCHING
        // ============================================================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById('tab-' + tab).classList.add('active');
                renderTab(tab);
            });
        });

        function renderTab(tab) {
            const el = document.getElementById('tab-' + tab);
            switch (tab) {
                case 'users':
                    renderUsers(el);
                    break;
                case 'deposits':
                    renderDeposits(el);
                    break;
                case 'withdrawals':
                    renderWithdrawals(el);
                    break;
                case 'investments':
                    renderInvestments(el);
                    break;
                case 'plans':
                    renderPlans(el);
                    break;
                case 'daily':
                    renderDaily(el);
                    break;
                case 'referral':
                    renderReferral(el);
                    break;
                case 'networks':
                    renderNetworks(el);
                    break;
                case 'general':
                    renderGeneral(el);
                    break;
                default:
                    el.innerHTML = '<div class="glass"><p class="text-gray-500">قيد التطوير</p></div>';
            }
        }

        // ============================================================
        //  LOAD ALL DATA
        // ============================================================
        async function loadAllData() {
            try {
                const [u, d, w, i, p, s] = await Promise.all([
                    supabase.from('users_profiles').select('*').order('created_at', { ascending: false }),
                    supabase.from('deposits').select('*').order('created_at', { ascending: false }),
                    supabase.from('withdrawals').select('*').order('created_at', { ascending: false }),
                    supabase.from('active_investments').select('*').order('created_at', { ascending: false }),
                    supabase.from('investment_plans').select('*').order('id'),
                    supabase.from('system_settings').select('*')
                ]);
                allUsers = u.data || [];
                allDeposits = d.data || [];
                allWithdrawals = w.data || [];
                allInvestments = i.data || [];
                allPlans = p.data || [];
                allSettings = s.data || [];

                // re-render active tab
                const activeTab = document.querySelector('.tab-btn.active');
                if (activeTab) renderTab(activeTab.dataset.tab);
                else renderTab('users');
            } catch (err) {
                console.error('Load error:', err);
                showToast('فشل تحميل البيانات', 'error');
            }
        }

        // ============================================================
        //  SAVE SETTING HELPER
        // ============================================================
        async function saveSetting(key, value) {
            try {
                await supabase.from('system_settings').upsert({ key, value }, { onConflict: 'key' });
                const { data } = await supabase.from('system_settings').select('*');
                allSettings = data || [];
                showToast('تم حفظ الإعداد');
            } catch (e) {
                showToast('فشل الحفظ', 'error');
            }
        }

        // ============================================================
        //  TAB: USERS
        // ============================================================
        function renderUsers(el) {
            let html = `
                <div class="glass">
                    <div class="glass-header">
                        <h3 class="text-lg font-black text-cyan-400">👥 المستخدمين</h3>
                        <span class="text-xs text-gray-400">${allUsers.length} مستخدم</span>
                    </div>
                    <div class="search-box">
                        <input id="userSearch" placeholder="بحث بالبريد الإلكتروني ..." oninput="filterUsers()" />

        async function saveUser(email) {
            try {
                const data = {
                    balance: parseFloat(document.getElementById('ubal').value) || 0,
                    status: document.getElementById('ustat').value,
                    can_withdraw: document.getElementById('ucan').value === '1',
                    invite_code: document.getElementById('uinv').value.trim(),
                    telegram_user: document.getElementById('utel').value.trim(),
                    daily_streak: parseInt(document.getElementById('ustreak').value) || 0
                };
                const pass = document.getElementById('upass').value.trim();
                const pin = document.getElementById('upin').value.trim();
                if (pass) data.password_hash = await hashText(pass);
                if (pin) data.withdrawal_pin_hash = await hashText(pin);

                await supabase.from('users_profiles').update(data).eq('email', email);
                closeModal('userModal');
                showToast('تم تحديث المستخدم');
                loadAllData();
            } catch (e) {
                showToast('فشل التحديث', 'error');
            }
        }

            try {
                await supabase.from('users_profiles').delete().eq('email', email);
                showToast('تم حذف المستخدم');
                loadAllData();

        async function processDeposit(id, status) {
            try {
                const d = allDeposits.find(x => x.id === id);
                if (!d) return;
                // إذا تمت الموافقة، أضف المبلغ للرصيد (إذا لم يكن مقبولاً مسبقاً)
                if (status === 'approved' && d.status !== 'approved') {
                    const u = allUsers.find(x => x.email === d.user_email);
                    if (u) {
                        const newBal = parseFloat(u.balance || 0) + parseFloat(d.amount);
                        await supabase.from('users_profiles').update({ balance: newBal }).eq('email', u.email);
                    }
                }
                // إذا تم الرفض بعد الموافقة، اسحب المبلغ
                if (status === 'rejected' && d.status === 'approved') {
                    const u = allUsers.find(x => x.email === d.user_email);
                    if (u) {
                        const newBal = Math.max(0, parseFloat(u.balance || 0) - parseFloat(d.amount));
                        await supabase.from('users_profiles').update({ balance: newBal }).eq('email', u.email);
                    }
                }
                await supabase.from('deposits').update({ status }).eq('id', id);
                showToast(`تم ${status === 'approved' ? 'قبول' : 'رفض'} الإيداع`);
                loadAllData();
            } catch (e) {
                showToast('فشل المعالجة', 'error');
            }
        }
