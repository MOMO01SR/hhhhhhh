<!DOCTYPE html>
<html lang="ar" dir="rtl" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net https://*.supabase.co">
    <title>POP Capital | لوحة التحكم الإدارية المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #06b6d4; --accent: #10b981; --dark: #020617; --danger: #ef4444; --purple: #a855f7; --warning: #f59e0b; --surface: rgba(15,23,42,0.85); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: #e2e8f0; min-height: 100vh; background-image: radial-gradient(circle at 20% 10%, rgba(6,182,212,0.06), transparent 50%), radial-gradient(circle at 80% 90%, rgba(168,85,247,0.05), transparent 50%); }
        .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
        .glass { background: var(--surface); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 20px 45px rgba(0,0,0,0.6); }
        .btn { padding: 0.55rem 1.1rem; border-radius: 0.7rem; font-weight: 700; border: none; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.25s; display: inline-flex; align-items: center; gap: 0.4rem; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: linear-gradient(135deg, #06b6d4, #2563eb); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; }
        .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; }
        .btn-info { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: #fff; }
        .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.65rem; }
        .btn-xs { padding: 0.2rem 0.5rem; font-size: 0.6rem; border-radius: 0.4rem; }
        .input-field { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 0.6rem 0.8rem; border-radius: 0.6rem; font-family: 'Cairo', monospace; width: 100%; font-size: 0.8rem; transition: 0.2s; }
        .input-field:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px rgba(6,182,212,0.15); }
        .input-sm { padding: 0.4rem 0.6rem; font-size: 0.7rem; }
        select.input-field { appearance: none; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: left 0.5rem center; background-size: 12px; padding-left: 2rem; }
        .badge { padding: 0.2rem 0.6rem; border-radius: 0.5rem; font-size: 0.65rem; font-weight: 800; display: inline-block; }
        .badge-success { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .badge-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .badge-warning { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
        .badge-info { background: rgba(6,182,212,0.15); color: #06b6d4; border: 1px solid rgba(6,182,212,0.3); }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th, td { padding: 0.7rem 0.5rem; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.04); white-space: nowrap; }
        th { color: var(--primary); font-weight: 900; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; background: rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 2; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .overflow-auto { overflow-x: auto; max-height: 500px; overflow-y: auto; border-radius: 0.8rem; }
        .tabs-wrapper { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; padding: 0.3rem; background: rgba(0,0,0,0.3); border-radius: 1rem; }
        .tab-btn { padding: 0.6rem 1.2rem; border-radius: 0.8rem; font-weight: 800; font-size: 0.75rem; cursor: pointer; background: transparent; border: none; color: #94a3b8; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #fff; box-shadow: 0 8px 20px rgba(6,182,212,0.2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeSlide 0.4s ease; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        .stat-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 1rem; padding: 1.2rem; text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: 900; font-family: monospace; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(2,6,23,0.9); backdrop-filter: blur(12px); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 1rem; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; width: 100%; max-width: 600px; padding: 2rem; max-height: 85vh; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 1rem; left: 1rem; background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .modal-close:hover { color: #fff; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-40px); background: #10b981; color: #fff; padding: 0.8rem 1.8rem; border-radius: 2rem; font-weight: 800; z-index: 99999; opacity: 0; pointer-events: none; transition: all 0.4s; box-shadow: 0 15px 30px rgba(16,185,129,0.4); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: #ef4444; box-shadow: 0 15px 30px rgba(239,68,68,0.4); }
        @media (max-width: 768px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="glass flex justify-between items-center flex-wrap gap-3 mb-4">
            <div>
                <h1 class="text-2xl font-black bg-gradient-to-l from-cyan-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">🛡️ POP CAPITAL - لوحة التحكم الإدارية</h1>
                <p class="text-xs text-gray-400 mt-1">إدارة متكاملة لجميع الجداول والعمليات المالية</p>
            </div>
            <div class="flex gap-2">
                <button onclick="refreshAllData()" class="btn btn-primary">🔄 تحديث شامل</button>
                <button onclick="exportData()" class="btn btn-info">📥 تصدير البيانات</button>
            </div>
        </header>

        <!-- إحصائيات سريعة -->
        <div class="grid-4 mb-4" id="statsGrid"></div>

        <!-- التبويبات -->
        <div class="tabs-wrapper" id="tabsNav">
            <button class="tab-btn active" data-tab="users">👥 المستخدمين</button>
            <button class="tab-btn" data-tab="deposits">📥 الإيداعات</button>
            <button class="tab-btn" data-tab="withdrawals">💸 السحوبات</button>
            <button class="tab-btn" data-tab="investments">📈 الاستثمارات</button>
            <button class="tab-btn" data-tab="plans">📊 الخطط</button>
            <button class="tab-btn" data-tab="daily">🎁 المكافآت</button>
            <button class="tab-btn" data-tab="referral">🔗 الإحالة</button>
            <button class="tab-btn" data-tab="networks">🌐 الشبكات</button>
            <button class="tab-btn" data-tab="general">⚙️ إعدادات عامة</button>
        </div>

        <!-- محتوى التبويبات -->
        <div class="tab-content active" id="tab-users"></div>
        <div class="tab-content" id="tab-deposits"></div>
        <div class="tab-content" id="tab-withdrawals"></div>
        <div class="tab-content" id="tab-investments"></div>
        <div class="tab-content" id="tab-plans"></div>
        <div class="tab-content" id="tab-daily"></div>
        <div class="tab-content" id="tab-referral"></div>
        <div class="tab-content" id="tab-networks"></div>
        <div class="tab-content" id="tab-general"></div>
    </div>

    <!-- مودال تعديل مستخدم -->
    <div id="userModal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('userModal')">✕</button>
            <h3 class="text-xl font-black text-cyan-400 mb-4">✏️ تعديل بيانات المستخدم</h3>
            <div id="userEditForm"></div>
        </div>
    </div>

    <!-- مودال تفاصيل الإيداع -->
    <div id="depositModal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('depositModal')">✕</button>
            <h3 class="text-xl font-black text-cyan-400 mb-4">📥 تفاصيل الإيداع</h3>
            <div id="depositDetailContent"></div>
        </div>
    </div>

    <!-- مودال إضافة خطة -->
    <div id="planModal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('planModal')">✕</button>
            <h3 class="text-xl font-black text-cyan-400 mb-4">➕ إضافة باقة استثمارية جديدة</h3>
            <div id="planAddForm"></div>
        </div>
    </div>

    <!-- رسالة تنبيه -->
    <div id="toast" class="toast"></div>

    <script>
        // ========== إعداد Supabase ==========
        const supabaseUrl = 'https://aqoufnmdhopmdobknczg.supabase.co';
        const supabaseKey = 'sb_publishable_BvmWY2L-ZfwkZloJ_uPaDw_9wTq84D-';
        const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // البيانات المخزنة
        let allUsers = [], allDeposits = [], allWithdrawals = [], allInvestments = [], allPlans = [], allSettings = [];
        let currentTab = 'users';

        // ========== دوال مساعدة ==========
        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast' + (isError ? ' error' : '') + ' show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function hashText(text) {
            if (!text) return '';
            const enc = new TextEncoder();
            const hash = await crypto.subtle.digest('SHA-256', enc.encode(text));
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function getSetting(key, def = '') {
            const s = allSettings.find(x => x.key === key);
            return s ? s.value : def;
        }

        async function saveSetting(key, value) {
            await _supabase.from('system_settings').upsert({ key, value }, { onConflict: 'key' });
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function formatDate(d) {
            if (!d) return '-';
            return new Date(d).toLocaleDateString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function formatDateTime(d) {
            if (!d) return '-';
            return new Date(d).toLocaleString('ar-EG');
        }

        // ========== تحميل البيانات ==========
        async function loadAllData() {
            try {
                const [uRes, dRes, wRes, iRes, pRes, sRes] = await Promise.all([
                    _supabase.from('users_profiles').select('*').order('created_at', { ascending: false }),
                    _supabase.from('deposits').select('*').order('created_at', { ascending: false }),
                    _supabase.from('withdrawals').select('*').order('created_at', { ascending: false }),
                    _supabase.from('active_investments').select('*').order('created_at', { ascending: false }),
                    _supabase.from('investment_plans').select('*').order('id'),
                    _supabase.from('system_settings').select('*')
                ]);
                allUsers = uRes.data || [];
                allDeposits = dRes.data || [];
                allWithdrawals = wRes.data || [];
                allInvestments = iRes.data || [];
                allPlans = pRes.data || [];
                allSettings = sRes.data || [];
                updateStats();
                renderCurrentTab();
            } catch (err) {
                console.error('خطأ في تحميل البيانات:', err);
                showToast('فشل تحميل البيانات من السيرفر', true);
            }
        }

        async function refreshAllData() {
            showToast('جاري تحديث جميع البيانات...');
            await loadAllData();
            showToast('تم تحديث البيانات بنجاح');
        }

        function exportData() {
            const data = {
                users: allUsers,
                deposits: allDeposits,
                withdrawals: allWithdrawals,
                investments: allInvestments,
                plans: allPlans,
                settings: allSettings
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'pop_capital_backup_' + new Date().toISOString().slice(0,10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('تم تصدير البيانات بنجاح');
        }

        // ========== إحصائيات ==========
        function updateStats() {
            const totalUsers = allUsers.length;
            const activeUsers = allUsers.filter(u => u.status === 'active').length;
            const totalDeposits = allDeposits.filter(d => d.status === 'approved').reduce((s, d) => s + parseFloat(d.amount || 0), 0);
            const pendingDeposits = allDeposits.filter(d => d.status === 'pending').length;
            const pendingWithdrawals = allWithdrawals.filter(w => w.status === 'pending').length;
            const totalInvested = allInvestments.filter(i => i.status === 'active').reduce((s, i) => s + parseFloat(i.amount || 0), 0);

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><p class="text-xs text-gray-400">👥 إجمالي المستخدمين</p><p class="stat-value text-cyan-400">${totalUsers}</p><p class="text-xs text-gray-500">نشط: ${activeUsers}</p></div>
                <div class="stat-card"><p class="text-xs text-gray-400">📥 إيداعات معلقة</p><p class="stat-value text-amber-400">${pendingDeposits}</p><p class="text-xs text-gray-500">المقبول: $${totalDeposits.toFixed(2)}</p></div>
                <div class="stat-card"><p class="text-xs text-gray-400">💸 سحوبات معلقة</p><p class="stat-value text-rose-400">${pendingWithdrawals}</p><p class="text-xs text-gray-500">تحتاج مراجعة</p></div>
                <div class="stat-card"><p class="text-xs text-gray-400">📈 رأس المال المستثمر</p><p class="stat-value text-emerald-400">$${totalInvested.toFixed(2)}</p><p class="text-xs text-gray-500">استثمارات نشطة</p></div>
            `;
        }

        // ========== التبويبات ==========
        document.getElementById('tabsNav').addEventListener('click', function(e) {
            if (e.target.classList.contains('tab-btn')) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentTab = e.target.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById('tab-' + currentTab).classList.add('active');
                renderCurrentTab();
            }
        });

        function renderCurrentTab() {
            switch (currentTab) {
                case 'users': renderUsers(); break;
                case 'deposits': renderDeposits(); break;
                case 'withdrawals': renderWithdrawals(); break;
                case 'investments': renderInvestments(); break;
                case 'plans': renderPlans(); break;
                case 'daily': renderDaily(); break;
                case 'referral': renderReferral(); break;
                case 'networks': renderNetworks(); break;
                case 'general': renderGeneral(); break;
            }
        }

        // ========== 1. المستخدمين ==========
        function renderUsers() {
            const el = document.getElementById('tab-users');
            let html = `<div class="glass"><h3 class="text-lg font-black text-cyan-400 mb-3">👥 إدارة المستخدمين</h3>
                <div class="flex gap-2 mb-3 flex-wrap">
                    <input id="userSearchInput" class="input-field" style="max-width:300px" placeholder="🔍 بحث بالبريد أو التيليجرام..." oninput="filterUsersTable()">
                    <button onclick="addNewUser()" class="btn btn-success btn-sm">➕ إضافة مستخدم</button>
                </div>
                <div class="overflow-auto"><table><thead><tr>
                    <th>البريد</th><th>تيليجرام</th><th>الرصيد</th><th>إجمالي الإيداع</th><th>إجمالي السحب</th><th>الأرباح</th><th>العمولات</th><th>الحالة</th><th>السحب</th><th>تاريخ التسجيل</th><th>إجراءات</th>
                </tr></thead><tbody id="usersTableBody"></tbody></table></div></div>`;
            el.innerHTML = html;
            filterUsersTable();
        }

        function filterUsersTable(searchTerm = '') {
            const term = (typeof searchTerm === 'string' ? searchTerm : document.getElementById('userSearchInput')?.value || '').toLowerCase();
            const filtered = allUsers.filter(u => (u.email || '').toLowerCase().includes(term) || (u.telegram_user || '').toLowerCase().includes(term));
            const tbody = document.getElementById('usersTableBody');
            if (!tbody) return;
            tbody.innerHTML = filtered.map(u => `
                <tr>
                    <td style="direction:ltr">${u.email}</td>
                    <td>${u.telegram_user || '-'}</td>
                    <td>$${parseFloat(u.balance || 0).toFixed(2)}</td>
                    <td>$${parseFloat(u.total_invested || 0).toFixed(2)}</td>
                    <td>$${parseFloat(u.total_withdrawn || 0).toFixed(2)}</td>
                    <td>$${parseFloat(u.profit_earned || 0).toFixed(2)}</td>
                    <td>$${parseFloat(u.total_commissions || 0).toFixed(2)}</td>
                    <td><span class="badge ${u.status === 'active' ? 'badge-success' : 'badge-danger'}">${u.status === 'active' ? 'نشط' : 'موقوف'}</span></td>
                    <td><span class="badge ${u.can_withdraw !== false ? 'badge-success' : 'badge-danger'}">${u.can_withdraw !== false ? 'مسموح' : 'محظور'}</span></td>
                    <td>${formatDate(u.created_at)}</td>
                    <td class="flex gap-1 flex-wrap">
                        <button class="btn btn-info btn-xs" onclick="openUserEdit('${u.email}')">✏️</button>
                        <button class="btn btn-warning btn-xs" onclick="toggleUserWithdraw('${u.email}', ${u.can_withdraw !== false})">${u.can_withdraw !== false ? '🚫 حظر' : '✅ فك'}</button>
                        <button class="btn btn-success btn-xs" onclick="adjustUserBalance('${u.email}')">💰</button>
                        <button class="btn btn-danger btn-xs" onclick="deleteUser('${u.email}')">🗑</button>
                    </td>
                </tr>
            `).join('');
        }

        function addNewUser() {
            const email = prompt('البريد الإلكتروني للمستخدم الجديد:');
            if (!email) return;
            const telegram = prompt('معرف تيليجرام (اختياري):') || '';
            const pass = prompt('كلمة المرور:');
            if (!pass) return;
            const pin = prompt('رمز PIN للسحب (4-8 أرقام):');
            if (!pin) return;
            (async () => {
                const passwordHash = await hashText(pass);
                const withdrawalPinHash = await hashText(pin);
                const inviteCode = String(Math.floor(10000 + Math.random() * 90000));
                const { error } = await _supabase.from('users_profiles').insert([{
                    email, telegram_user: telegram, password_hash: passwordHash, withdrawal_pin_hash: withdrawalPinHash,
                    status: 'active', balance: 0, total_commissions: 0, daily_streak: 1, invite_code: inviteCode,
                    referred_by: 'admin', has_used_welcome_plan: false, can_withdraw: true,
                    total_invested: 0, total_withdrawn: 0, profit_earned: 0
                }]);
                if (error) { showToast('خطأ: ' + error.message, true); return; }
                showToast('تم إضافة المستخدم بنجاح');
                loadAllData();
            })();
        }

        function openUserEdit(email) {
            const u = allUsers.find(x => x.email === email);
            if (!u) return;
            document.getElementById('userEditForm').innerHTML = `
                <div class="grid-2">
                    <div><label class="text-xs text-gray-400">الرصيد</label><input id="ed_bal" class="input-field" type="number" step="0.01" value="${u.balance || 0}"></div>
                    <div><label class="text-xs text-gray-400">الحالة</label><select id="ed_status" class="input-field"><option value="active" ${u.status==='active'?'selected':''}>نشط</option><option value="suspended" ${u.status==='suspended'?'selected':''}>موقوف</option></select></div>
                    <div><label class="text-xs text-gray-400">صلاحية السحب</label><select id="ed_canwithdraw" class="input-field"><option value="1" ${u.can_withdraw!==false?'selected':''}>مسموح</option><option value="0" ${u.can_withdraw===false?'selected':''}>محظور</option></select></div>
                    <div><label class="text-xs text-gray-400">كود الإحالة</label><input id="ed_invite" class="input-field" value="${u.invite_code || ''}"></div>
                    <div><label class="text-xs text-gray-400">تيليجرام</label><input id="ed_tel" class="input-field" value="${u.telegram_user || ''}"></div>
                    <div><label class="text-xs text-gray-400">أيام النشاط</label><input id="ed_streak" class="input-field" type="number" value="${u.daily_streak || 0}"></div>
                    <div><label class="text-xs text-gray-400">إجمالي الإيداع</label><input id="ed_invested" class="input-field" type="number" step="0.01" value="${u.total_invested || 0}"></div>

        async function processDeposit(id, status) {
            const d = allDeposits.find(x => x.id === id);
            if (!d) return;
            const user = allUsers.find(x => x.email === d.user_email);
            if (status === 'approved' && d.status !== 'approved') {
                if (user) {
                    const newBal = parseFloat(user.balance || 0) + parseFloat(d.amount);
                    await _supabase.from('users_profiles').update({ balance: newBal }).eq('email', user.email);
                }
            }
            if (status === 'rejected' && d.status === 'approved') {
                if (user) {
                    const newBal = Math.max(0, parseFloat(user.balance || 0) - parseFloat(d.amount));
                    await _supabase.from('users_profiles').update({ balance: newBal }).eq('email', user.email);
                }
            }
            await _supabase.from('deposits').update({ status }).eq('id', id);
            showToast(status === 'approved' ? 'تم قبول الإيداع وإضافة الرصيد' : 'تم رفض الإيداع');
            loadAllData();
        }

                    <select id="stat_${n.sk}" class="input-field" style="max-width:120px">
                        <option value="active" ${getSetting(n.sk)==='active'?'selected':''}>نشطة</option>
                        <option value="maintenance" ${getSetting(n.sk)==='maintenance'?'selected':''}>صيانة</option>
                    </select>
                    <button class="btn btn-success btn-sm" onclick="saveNetwork('${n.key}','${n.sk}')">💾 حفظ</button>
                </div>`;
            });
            html += '</div>';
            el.innerHTML = html;
        }

        async function saveNetwork(addrKey, statusKey) {
            const addr = document.getElementById('addr_' + addrKey).value;
            const status = document.getElementById('stat_' + statusKey).value;
            await saveSetting(addrKey, addr);
            await saveSetting(statusKey, status);
            allSettings = (await _supabase.from('system_settings').select('*')).data || [];
            showToast('تم حفظ إعدادات الشبكة');
        }

        // ========== 9. إعدادات عامة ==========
        function renderGeneral() {
            const el = document.getElementById('tab-general');
            el.innerHTML = `<div class="glass"><h3 class="text-lg font-black text-cyan-400 mb-3">⚙️ الإعدادات العامة</h3>
                <div class="grid-2">
                    <div><label class="text-xs text-gray-400">الحد الأدنى للسحب ($)</label><input id="g_min" class="input-field" value="${getSetting('min_withdraw','5')}" type="number"></div>
                    <div><label class="text-xs text-gray-400">رسوم السحب (%)</label><input id="g_fee" class="input-field" value="${getSetting('withdraw_fee_percent','2')}" type="number" step="0.1"></div>
                    <div><label class="text-xs text-gray-400">رابط صفحة التسجيل</label><input id="g_url" class="input-field" value="${getSetting('base_register_url','register.html')}"></div>
                </div>
                <button class="btn btn-primary mt-3" onclick="saveGeneralSettings()">💾 حفظ الإعدادات العامة</button></div>`;
        }

        async function saveGeneralSettings() {
            await saveSetting('min_withdraw', document.getElementById('g_min').value);
            await saveSetting('withdraw_fee_percent', document.getElementById('g_fee').value);
            await saveSetting('base_register_url', document.getElementById('g_url').value);
            allSettings = (await _supabase.from('system_settings').select('*')).data || [];
            showToast('تم حفظ الإعدادات العامة');
        }

        // ========== بدء التشغيل ==========
        loadAllData();

        // حماية بسيطة
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && ['u','s'].includes(e.key))) e.preventDefault();
        });
    </script>
</body>
</html>
