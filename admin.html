<!DOCTYPE html>
<html lang="ar" dir="rtl" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net https://*.supabase.co">
    <meta name="theme-color" content="#020617">
    <title>POP Capital | لوحة التحكم الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #06b6d4; --accent: #10b981; --dark: #020617; --danger: #ef4444; --purple: #a855f7; --warning: #f59e0b; }
        * { user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; margin: 0; padding: 1rem; min-height: 100vh; background-image: radial-gradient(circle at 10% 15%, rgba(6,182,212,0.08), transparent 40%), radial-gradient(circle at 90% 85%, rgba(16,185,129,0.05), transparent 40%); }
        .glass { background: linear-gradient(145deg, rgba(15,23,42,0.9), rgba(2,6,15,0.95)); backdrop-filter: blur(35px); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        .btn { padding: 0.6rem 1.2rem; border-radius: 0.6rem; font-weight: 800; border: none; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.65rem; }
        .btn-primary { background: linear-gradient(90deg, #06b6d4, #2563eb); color: white; }
        .btn-success { background: linear-gradient(90deg, #10b981, #059669); color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: black; }
        .btn-info { background: #3b82f6; color: white; }
        .input-field { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 0.6rem; border-radius: 0.6rem; font-family: monospace; width: 100%; margin: 0.2rem 0; font-size: 0.75rem; }
        .input-field:focus { outline: none; border-color: var(--primary); }
        .tab-btn { padding: 0.5rem 0.9rem; border-radius: 0.5rem; font-weight: 800; font-size: 0.7rem; cursor: pointer; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); color: #94a3b8; margin: 0.2rem; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .badge { padding: 0.2rem 0.5rem; border-radius: 0.5rem; font-size: 0.65rem; font-weight: 800; }
        .badge-pending { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .badge-approved { background: rgba(16,185,129,0.2); color: #10b981; }
        .badge-rejected { background: rgba(239,68,68,0.2); color: #ef4444; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        th, td { padding: 0.5rem; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--primary); font-weight: 900; font-size: 0.65rem; text-transform: uppercase; }
        .tabs-container { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 1rem; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
        .search-box { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.8rem; padding: 0.5rem 1rem; display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; font-family: monospace; }
        .overflow-table { overflow-x: auto; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 1rem; }
        .modal.active { display: flex; }
        .modal-box { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; width: 100%; max-width: 500px; padding: 2rem; max-height: 85vh; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 1rem; left: 1rem; background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body class="max-w-5xl mx-auto">
    <header class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-purple-200 to-purple-500">ADMIN PANEL</h1>
        <button onclick="location.reload()" class="btn btn-primary">🔄 تحديث البيانات</button>
    </header>

    <!-- التبويبات -->
    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('users')">👥 المستخدمين</button>
        <button class="tab-btn" onclick="switchTab('deposits')">📥 الإيداعات</button>
        <button class="tab-btn" onclick="switchTab('withdrawals')">💸 السحوبات</button>
        <button class="tab-btn" onclick="switchTab('investments')">📋 الاستثمارات</button>
        <button class="tab-btn" onclick="switchTab('plans')">📊 الخطط</button>
        <button class="tab-btn" onclick="switchTab('daily')">🎁 المكافآت</button>
        <button class="tab-btn" onclick="switchTab('referral')">👥 الإحالة</button>
        <button class="tab-btn" onclick="switchTab('networks')">🌐 الشبكات</button>
        <button class="tab-btn" onclick="switchTab('general')">⚙️ الإعدادات</button>
    </div>

    <div class="tab-content active" id="tab-users"></div>
    <div class="tab-content" id="tab-deposits"></div>
    <div class="tab-content" id="tab-withdrawals"></div>
    <div class="tab-content" id="tab-investments"></div>
    <div class="tab-content" id="tab-plans"></div>
    <div class="tab-content" id="tab-daily"></div>
    <div class="tab-content" id="tab-referral"></div>
    <div class="tab-content" id="tab-networks"></div>
    <div class="tab-content" id="tab-general"></div>

    <!-- مودال تعديل المستخدم -->
    <div id="userModal" class="modal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('userModal')">✕</button>
            <h3 class="text-lg font-black text-cyan-400 mb-4">✏️ تعديل المستخدم</h3>
            <div id="userEditForm"></div>
        </div>
    </div>

    <!-- مودال تفاصيل الإيداع -->
    <div id="depositModal" class="modal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('depositModal')">✕</button>
            <h3 class="text-lg font-black text-cyan-400 mb-4">📥 تفاصيل الإيداع</h3>
            <div id="depositDetailContent"></div>
        </div>
    </div>

<script>
    const supabaseUrl = 'https://aqoufnmdhopmdobknczg.supabase.co';
    const supabaseKey = 'sb_publishable_BvmWY2L-ZfwkZloJ_uPaDw_9wTq84D-';
    const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    let allUsers=[], allDeposits=[], allWithdrawals=[], allInvestments=[], allPlans=[], allSettings=[];

    // حماية
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => { if (e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&['u','s'].includes(e.key))) e.preventDefault(); });
    setInterval(() => console.clear(), 1000);

    async function loadAllData() {
        const [u, d, w, i, p, s] = await Promise.all([
            _supabase.from('users_profiles').select('*').order('created_at',{ascending:false}),
            _supabase.from('deposits').select('*').order('created_at',{ascending:false}),
            _supabase.from('withdrawals').select('*').order('created_at',{ascending:false}),
            _supabase.from('active_investments').select('*').order('created_at',{ascending:false}),
            _supabase.from('investment_plans').select('*').order('id'),
            _supabase.from('system_settings').select('*')
        ]);
        allUsers = u.data || []; allDeposits = d.data || []; allWithdrawals = w.data || [];
        allInvestments = i.data || []; allPlans = p.data || []; allSettings = s.data || [];
        if (document.querySelector('.tab-btn.active')) renderTab(document.querySelector('.tab-btn.active').innerText.includes('المستخدمين')?'users':'users');
        else switchTab('users');
    }

    function getSetting(key, def='') { return allSettings.find(s=>s.key===key)?.value || def; }
    async function saveSetting(key, value) { await _supabase.from('system_settings').upsert({key,value},{onConflict:'key'}); allSettings = (await _supabase.from('system_settings').select('*')).data||[]; }
    async function hashText(t) { if(!t) return ''; const e = new TextEncoder(); const h = await crypto.subtle.digest('SHA-256', e.encode(t)); return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join(''); }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
        document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
        document.getElementById('tab-'+tab).classList.add('active');
        renderTab(tab);
    }

    function renderTab(tab) {
        const el = document.getElementById('tab-'+tab);
        switch(tab) {
            case 'users': renderUsers(el); break;
            case 'deposits': renderDeposits(el); break;
            case 'withdrawals': renderWithdrawals(el); break;
            case 'investments': renderInvestments(el); break;
            case 'plans': renderPlans(el); break;
            case 'daily': renderDaily(el); break;
            case 'referral': renderReferral(el); break;
            case 'networks': renderNetworks(el); break;
            case 'general': renderGeneral(el); break;
        }
    }

    // ========== المستخدمين ==========
    function renderUsers(el) {
        let html = `<div class="glass"><h3 class="text-lg font-black text-cyan-400 mb-4">👥 المستخدمين</h3>
            <div class="search-box"><input id="userSearch" placeholder="بحث بالبريد..." oninput="filterUsers()"></div>
            <div class="overflow-table"><table><thead><tr><th>البريد</th><th>تاريخ التسجيل</th><th>كود الدعوة</th><th>الرصيد</th><th>إيداع</th><th>مسحوب</th><th>أرباح</th><th>السحب</th><th>إجراءات</th></tr></thead><tbody id="usersBody"></tbody></table></div></div>`;
        el.innerHTML = html;
        renderUsersTable(allUsers);
    }

    function renderUsersTable(users) {
        const tbody = document.getElementById('usersBody');
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${u.email}</td><td>${new Date(u.created_at).toLocaleDateString('ar')}</td><td>${u.invite_code||'-'}</td>
                <td>$${parseFloat(u.balance||0).toFixed(2)}</td><td>$${parseFloat(u.total_invested||0).toFixed(2)}</td>
                <td>$${parseFloat(u.total_withdrawn||0).toFixed(2)}</td><td>$${parseFloat(u.profit_earned||0).toFixed(2)}</td>
                <td><span class="badge ${u.can_withdraw!==false?'badge-approved':'badge-rejected'}">${u.can_withdraw!==false?'مسموح':'ممنوع'}</span></td>
                <td class="flex gap-1 flex-wrap">
                    <button class="btn btn-warning btn-sm" onclick="openUserModal('${u.email}')">✏️</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.email}')">🗑</button>
                    <button class="btn btn-info btn-sm" onclick="toggleWithdraw('${u.email}',${u.can_withdraw!==false})">${u.can_withdraw!==false?'🚫 حظر':'✅ فك'}</button>
                </td>
            </tr>
        `).join('');
    }

    function filterUsers() { const q = document.getElementById('userSearch').value.toLowerCase(); renderUsersTable(allUsers.filter(u=>u.email?.toLowerCase().includes(q))); }

    async function openUserModal(email) {
        const u = allUsers.find(x=>x.email===email); if(!u) return;
        document.getElementById('userEditForm').innerHTML = `
            <div class="grid-2">
                <div><label class="text-xs text-gray-400">الرصيد</label><input type="number" id="ubal" class="input-field" value="${u.balance||0}"></div>
                <div><label class="text-xs text-gray-400">الحالة</label><select id="ustat" class="input-field"><option value="active" ${u.status==='active'?'selected':''}>نشط</option><option value="suspended" ${u.status==='suspended'?'selected':''}>موقوف</option></select></div>
                <div><label class="text-xs text-gray-400">السحب</label><select id="ucan" class="input-field"><option value="1" ${u.can_withdraw!==false?'selected':''}>مسموح</option><option value="0" ${u.can_withdraw===false?'selected':''}>محظور</option></select></div>
                <div><label class="text-xs text-gray-400">كود الإحالة</label><input type="text" id="uinv" class="input-field" value="${u.invite_code||''}"></div>
                <div><label class="text-xs text-gray-400">كلمة المرور (جديدة)</label><input type="text" id="upass" class="input-field" placeholder="اترك فارغاً"></div>
                <div><label class="text-xs text-gray-400">PIN (جديد)</label><input type="text" id="upin" class="input-field" placeholder="اترك فارغاً"></div>
                <div><label class="text-xs text-gray-400">تيليجرام</label><input type="text" id="utel" class="input-field" value="${u.telegram_user||''}"></div>
                <div><label class="text-xs text-gray-400">أيام النشاط</label><input type="number" id="ustreak" class="input-field" value="${u.daily_streak||0}"></div>
            </div>
            <button onclick="saveUser('${u.email}')" class="btn btn-success w-full mt-4">💾 حفظ</button>
        `;
        document.getElementById('userModal').classList.add('active');
    }

    async function saveUser(email) {
        const data = {
            balance: parseFloat(document.getElementById('ubal').value)||0,
            status: document.getElementById('ustat').value,
            can_withdraw: document.getElementById('ucan').value==='1',
            invite_code: document.getElementById('uinv').value,
            telegram_user: document.getElementById('utel').value,
            daily_streak: parseInt(document.getElementById('ustreak').value)||0
        };
        const pass = document.getElementById('upass').value.trim();
        const pin = document.getElementById('upin').value.trim();
        if (pass) data.password_hash = await hashText(pass);
        if (pin) data.withdrawal_pin_hash = await hashText(pin);
        await _supabase.from('users_profiles').update(data).eq('email',email);
        closeModal('userModal'); loadAllData();
    }

    async function deleteUser(email) { if(confirm('حذف المستخدم؟')) { await _supabase.from('users_profiles').delete().eq('email',email); loadAllData(); } }
    async function toggleWithdraw(email, cur) { await _supabase.from('users_profiles').update({can_withdraw:!cur}).eq('email',email); loadAllData(); }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    // ========== الإيداعات ==========
    function renderDeposits(el) {
        let html = `<div class="glass"><h3 class="text-lg font-black text-cyan-400 mb-4">📥 طلبات الإيداع</h3>`;
        if (!allDeposits.length) html += '<p class="text-gray-500">لا توجد طلبات</p>';
        else {
            html += `<table><tr><th>المستخدم</th><th>الشبكة</th><th>المبلغ</th><th>TxID</th><th>صورة</th><th>التاريخ</th><th>إجراء</th></tr>`;
            allDeposits.forEach(d => {
                html += `<tr>
                    <td>${d.user_email}</td><td>${d.crypto_currency}</td><td>$${parseFloat(d.amount).toFixed(2)}</td>
                    <td style="direction:ltr;font-size:0.6rem;">${d.tx_hash?.substring(0,10)}...</td>
                    <td>${d.image_url ? `<a href="${d.image_url}" target="_blank" class="text-cyan-400">عرض</a>` : '-'}</td>
                    <td>${new Date(d.created_at).toLocaleDateString('ar')}</td>
                    <td class="flex gap-1">
                        ${d.status==='pending' ? `<button class="btn btn-success btn-sm" onclick="processDeposit(${d.id},'approved')">قبول</button><button class="btn btn-danger btn-sm" onclick="processDeposit(${d.id},'rejected')">رفض</button>` : `<span class="badge ${d.status==='approved'?'badge-approved':'badge-rejected'}">${d.status==='approved'?'مقبول':'مرفوض'}</span>`}
                        <button class="btn btn-info btn-sm" onclick="viewDepositDetail(${d.id})">🔍</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteDeposit(${d.id})">🗑</button>
                    </td>
                </tr>`;
            });
            html += '</table>';
        }
        html += '</div>'; el.innerHTML = html;
    }

    async function processDeposit(id, status) {
        const d = allDeposits.find(x=>x.id===id); if(!d) return;
        if (status==='approved' && d.status!=='approved') {
            const u = allUsers.find(x=>x.email===d.user_email);
            if (u) await _supabase.from('users_profiles').update({balance: parseFloat(u.balance||0)+parseFloat(d.amount)}).eq('email', u.email);
        }
        if (status==='rejected' && d.status==='approved') {
            const u = allUsers.find(x=>x.email===d.user_email);
            if (u) await _supabase.from('users_profiles').update({balance: Math.max(0, parseFloat(u.balance||0)-parseFloat(d.amount))}).eq('email', u.email);
        }
        await _supabase.from('deposits').update({status}).eq('id', id);
        loadAllData();
    }

    async function deleteDeposit(id) { if(confirm('حذف الإيداع؟')) { await _supabase.from('deposits').delete().eq('id',id); loadAllData(); } }

    function viewDepositDetail(id) {
        const d = allDeposits.find(x=>x.id===id); if(!d) return;
        document.getElementById('depositDetailContent').innerHTML = `
            <p><strong>المستخدم:</strong> ${d.user_email}</p>
            <p><strong>المبلغ:</strong> $${parseFloat(d.amount).toFixed(2)}</p>
            <p><strong>الشبكة:</strong> ${d.crypto_currency}</p>
            <p><strong>TxID:</strong> <span style="direction:ltr;word-break:break-all;">${d.tx_hash}</span></p>
            ${d.image_url ? `<p><strong>الصورة:</strong><br><img src="${d.image_url}" style="max-width:100%;border-radius:1rem;"></p>` : ''}
        `;
        document.getElementById('depositModal').classList.add('active');
    }

    // ========== السحوبات ==========
    function renderWithdrawals(el) {
        let html = `<div class="glass"><h3 class="text-lg font-black text-cyan-400 mb-4">💸 طلبات السحب</h3>`;
        if (!allWithdrawals.length) html += '<p class="text-gray-500">لا توجد طلبات</p>';
        else {
            html += `<table><tr><th>المستخدم</th><th>الشبكة</th><th>المبلغ</th><th>العنوان</th><th>التاريخ</th><th>إجراء</th></tr>`;
            allWithdrawals.forEach(w => {
                html += `<tr>
                    <td>${w.user_email}</td><td>${w.crypto_currency}</td><td>$${parseFloat(w.amount).toFixed(2)}</td>
                    <td style="direction:ltr;font-size:0.6rem;">${w.wallet_address?.substring(0,10)}...</td>
                    <td>${new Date(w.created_at).toLocaleDateString('ar')}</td>
                    <td class="flex gap-1">
                        ${w.status==='pending' ? `<button class="btn btn-success btn-sm" onclick="processWithdrawal(${w.id},'approved')">قبول</button><button class="btn btn-danger btn-sm" onclick="processWithdrawal(${w.id},'rejected')">رفض</button>` : `<span class="badge ${w.status==='approved'?'badge-approved':'badge-rejected'}">${w.status==='approved'?'مقبول':'مرفوض'}</span>`}
                        <button class="btn btn-danger btn-sm" onclick="deleteWithdrawal(${w.id})">🗑</button>
                    </td>
                </tr>`;
            });
            html += '</table>';
        }
        html += '</div>'; el.innerHTML = html;
    }

    async function processWithdrawal(id, status) {
        const w = allWithdrawals.find(x=>x.id===id); if(!w) return;
        if (status==='rejected') {
            const u = allUsers.find(x=>x.email===w.user_email);
            if (u) await _supabase.from('users_profiles').update({balance: parseFloat(u.balance||0)+parseFloat(w.amount)}).eq('email', u.email);
        }
        await _supabase.from('withdrawals').update({status}).eq('id', id);
        loadAllData();
    }

    async function deleteWithdrawal(id) { if(confirm('حذف السحب؟')) { await _supabase.from('withdrawals').delete().eq('id',id); loadAllData(); } }

    // ========== الاستثمارات ==========
    function renderInvestments(el) {
        let html = `<div class="glass"><h3 class="text-lg font-black text-cyan-400 mb-4">📋 الاستثمارات النشطة</h3>`;
        if (!allInvestments.length) html += '<p class="text-gray-500">لا توجد استثمارات</p>';
        else {
            html += `<table><tr><th>المستخدم</th><th>الخطة</th><th>المبلغ</th><th>ربح يومي</th><th>البداية</th><th>النهاية</th><th>إجراء</th></tr>`;
            allInvestments.forEach(inv => {
                const plan = allPlans.find(p=>p.id===inv.plan_id);
                html += `<tr>
                    <td>${inv.user_email}</td><td>${plan?.name||inv.plan_id}</td><td>$${parseFloat(inv.amount).toFixed(2)}</td>
                    <td>$${parseFloat(inv.daily_profit).toFixed(4)}</td>
                    <td>${new Date(inv.start_date).toLocaleDateString('ar')}</td>
                    <td>${new Date(inv.end_date).toLocaleDateString('ar')}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteInvestment(${inv.id})">🗑</button></td>
                </tr>`;
            });
            html += '</table>';
        }
        html += '</div>'; el.innerHTML = html;
    }

    async function deleteInvestment(id) { if(confirm('حذف الاستثمار؟')) { await _supabase.from('active_investments').delete().eq('id',id); loadAllData(); } }

    // ========== الخطط ==========
    function renderPlans(el) {
        let html = `<div class="glass"><h3 class="text-lg font-black text-cyan-400 mb-4">📊 باقات الاستثمار</h3><div class="space-y-2 mb-4">`;
        allPlans.forEach(p => {
            html += `<div class="flex items-center gap-2 p-2 bg-black/30 rounded text-xs">
                <span class="font-bold w-24">${p.name}</span><span>${p.daily_profit_percent}%</span><span>${p.duration_days}يوم</span>
                <span>$${p.min_amount}-$${p.max_amount}</span>
                <span class="badge ${p.status==='active'?'badge-approved':'badge-rejected'}">${p.status}</span>
                <button class="btn btn-warning btn-sm" onclick="togglePlan(${p.id},'${p.status}')">تبديل</button>
                <button class="btn btn-danger btn-sm" onclick="deletePlan(${p.id})">حذف</button>
            </div>`;
        });
        html += `</div><h4 class="text-sm font-bold mb-2">إضافة باقة</h4><div class="grid-3">
            <input id="pn" class="input-field" placeholder="الاسم">
            <input id="pp" class="input-field" placeholder="الربح %" type="number" step="0.1">
            <input id="pd" class="input-field" placeholder="المدة (يوم)" type="number">
            <input id="pmin" class="input-field" placeholder="الحد الأدنى $" type="number">
            <input id="pmax" class="input-field" placeholder="الحد الأقصى $" type="number">
            <select id="pw" class="input-field"><option value="false">عادية</option><option value="true">ترحيبية</option></select>
        </div><button class="btn btn-success w-full mt-2" onclick="addPlan()">إضافة</button></div>`;
        el.innerHTML = html;
    }

    async function addPlan() {
        const n=document.getElementById('pn').value, p=parseFloat(document.getElementById('pp').value), d=parseInt(document.getElementById('pd').value), min=parseFloat(document.getElementById('pmin').value), max=parseFloat(document.getElementById('pmax').value), w=document.getElementById('pw').value==='true';
        if(!n||!p||!d||!min||!max) return alert('املأ الحقول');
        await _supabase.from('investment_plans').insert({name:n,daily_profit_percent:p,duration_days:d,min_amount:min,max_amount:max,is_welcome_plan:w,status:'active'});
        alert('تم'); loadAllData();
    }
    async function togglePlan(id,st) { await _supabase.from('investment_plans').update({status:st==='active'?'inactive':'active'}).eq('id',id); loadAllData(); }
    async function deletePlan(id) { if(confirm('حذف؟')){ await _supabase.from('investment_plans').delete().eq('id',id); loadAllData(); } }

    // ========== المكافآت ==========
    function renderDaily(el) {
        el.innerHTML = `<div class="glass"><h3 class="text-lg font-black text-cyan-400 mb-4">🎁 المكافآت اليومية</h3><div class="grid-3">
            <div><label class="text-xs">المكافأة الأساسية ($)</label><input id="db" class="input-field" value="${getSetting('daily_base_reward','0.08')}" type="number" step="0.01"></div>
            <div><label class="text-xs">الزيادة اليومية ($)</label><input id="di" class="input-field" value="${getSetting('daily_increment','0.02')}" type="number" step="0.01"></div>
            <div><label class="text-xs">عدد الأيام</label><input id="dd" class="input-field" value="${getSetting('daily_total_days','30')}" type="number"></div>
        </div><button class="btn btn-primary w-full mt-4" onclick="saveDaily()">حفظ</button></div>`;
    }
    async function saveDaily() { await saveSetting('daily_base_reward',document.getElementById('db').value); await saveSetting('daily_increment',document.getElementById('di').value); await saveSetting('daily_total_days',document.getElementById('dd').value); alert('تم'); }

    // ========== الإحالة ==========
    function renderReferral(el) {
        el.innerHTML = `<div class="glass"><h3 class="text-lg font-black text-cyan-400 mb-4">👥 نظام الإحالة</h3><div class="grid-2">
            <div><label class="text-xs">نسبة المستوى 1 (%)</label><input id="r1" class="input-field" value="${getSetting('referral_tier1_percent','10')}"></div>
            <div><label class="text-xs">مشتركي المستوى 1</label><input id="r1r" class="input-field" value="${getSetting('referral_tier1_required','0')}"></div>
            <div><label class="text-xs">نسبة المستوى 2 (%)</label><input id="r2" class="input-field" value="${getSetting('referral_tier2_percent','5')}"></div>
            <div><label class="text-xs">مشتركي المستوى 2</label><input id="r2r" class="input-field" value="${getSetting('referral_tier2_required','5')}"></div>
            <div><label class="text-xs">نسبة المستوى 3 (%)</label><input id="r3" class="input-field" value="${getSetting('referral_tier3_percent','2')}"></div>
            <div><label class="text-xs">مشتركي المستوى 3</label><input id="r3r" class="input-field" value="${getSetting('referral_tier3_required','10')}"></div>
        </div><button class="btn btn-primary w-full mt-4" onclick="saveReferral()">حفظ</button></div>`;
    }
    async function saveReferral() { await saveSetting('referral_tier1_percent',document.getElementById('r1').value); await saveSetting('referral_tier1_required',document.getElementById('r1r').value); await saveSetting('referral_tier2_percent',document.getElementById('r2').value); await saveSetting('referral_tier2_required',document.getElementById('r2r').value); await saveSetting('referral_tier3_percent',document.getElementById('r3').value); await saveSetting('referral_tier3_required',document.getElementById('r3r').value); alert('تم'); }

    // ========== شبكات الإيداع ==========
    function renderNetworks(el) {
        const nets = [{key:'usdt_trc20_address',name:'USDT TRC20',sk:'network_trc20_status'},{key:'usdt_bep20_address',name:'USDT BEP20',sk:'network_bep20_status'},{key:'usdt_bnb_address',name:'BNB',sk:'network_bnb_status'}];
        let html = `<div class="glass"><h3 class="text-lg font-black text-cyan-400 mb-4">🌐 شبكات الإيداع</h3>`;
        nets.forEach(n => html += `<div class="flex items-center gap-3 mb-3 p-3 bg-black/30 rounded"><span class="w-32 text-sm font-bold">${n.name}</span><input id="addr_${n.key}" class="input-field flex-1" value="${getSetting(n.key,'')}"><select id="stat_${n.sk}" class="input-field w-28"><option value="active" ${getSetting(n.sk)==='active'?'selected':''}>نشطة</option><option value="maintenance" ${getSetting(n.sk)==='maintenance'?'selected':''}>صيانة</option></select><button class="btn btn-success btn-sm" onclick="saveNet('${n.key}','${n.sk}')">حفظ</button></div>`);
        html += '</div>'; el.innerHTML = html;
    }
    async function saveNet(ak,sk) { await saveSetting(ak,document.getElementById('addr_'+ak).value); await saveSetting(sk,document.getElementById('stat_'+sk).value); alert('تم'); }

    // ========== الإعدادات العامة ==========
    function renderGeneral(el) {
        el.innerHTML = `<div class="glass"><h3 class="text-lg font-black text-cyan-400 mb-4">⚙️ الإعدادات العامة</h3><div class="grid-2">
            <div><label class="text-xs">الحد الأدنى للسحب ($)</label><input id="gen_min" class="input-field" value="${getSetting('min_withdraw','5')}" type="number"></div>
            <div><label class="text-xs">رسوم السحب (%)</label><input id="gen_fee" class="input-field" value="${getSetting('withdraw_fee_percent','2')}" type="number" step="0.1"></div>
            <div><label class="text-xs">رابط التسجيل</label><input id="gen_url" class="input-field" value="${getSetting('base_register_url','register.html')}"></div>
        </div><button class="btn btn-primary w-full mt-4" onclick="saveGeneral()">حفظ</button></div>`;
    }
    async function saveGeneral() { await saveSetting('min_withdraw',document.getElementById('gen_min').value); await saveSetting('withdraw_fee_percent',document.getElementById('gen_fee').value); await saveSetting('base_register_url',document.getElementById('gen_url').value); alert('تم'); }

    // بدء التشغيل
    loadAllData();
</script>
</body>
</html>
