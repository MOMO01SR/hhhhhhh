<!DOCTYPE html>
<html lang="ar" dir="rtl" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net https://*.supabase.co">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="theme-color" content="#020617">
    <title>POP Capital | المكافأة اليومية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #06b6d4; --accent: #10b981; --dark: #020617; 
            --surface: rgba(15, 23, 42, 0.65); --purple: #a855f7;
        }

        * { user-select: none; -webkit-user-select: none; -webkit-user-drag: none; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif; background-color: var(--dark); color: white; margin: 0;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(16, 185, 129, 0.08), transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(6, 182, 212, 0.05), transparent 50%);
            background-attachment: fixed; padding-bottom: 8rem; overflow-x: hidden;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        @media print { body { display: none; } }

        #initLoader { 
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(20px); z-index: 99999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .square-loader {
            width: 90px; height: 90px; background: rgba(16, 185, 129, 0.03);
            border: 2px solid rgba(16, 185, 129, 0.3); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.15);
            animation: squarePulse 2.5s ease-in-out infinite alternate;
        }
        @keyframes squarePulse {
            0% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.15); }
            100% { box-shadow: 0 0 40px rgba(16, 185, 129, 0.5); }
        }
        .circle-spinner {
            width: 55px; height: 55px; border-radius: 50%; border: 3px solid transparent;
            border-top-color: var(--accent); border-right-color: var(--primary);
            border-bottom-color: var(--purple); border-left-color: rgba(255,255,255,0.2);
            animation: spinClockwise 1s linear infinite;
        }
        @keyframes spinClockwise { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .terminal-status { font-family: monospace; color: var(--accent); font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 2rem; font-weight: bold; text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }

        #mainApp { display: none; width: 100%; animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-panel {
            background: var(--surface); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); position: relative; overflow: hidden;
            max-width: 380px; width: 100%; margin: 0 auto; text-align: center; padding: 2.5rem 1.5rem;
        }

        .glass-panel::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(16,185,129,0.08), transparent 60%);
            pointer-events: none;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 512px; background: rgba(2, 6, 15, 0.95); backdrop-filter: blur(40px);
            border-top: 1px solid rgba(6, 182, 212, 0.15); border-radius: 2.5rem 2.5rem 0 0;
            display: flex; justify-content: space-around; align-items: center;
            padding: 1rem 0.5rem 1.5rem; z-index: 1000;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.7);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; color: #6b7280; text-decoration: none; transition: all 0.3s; width: 20%; }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 24px; height: 24px; transition: all 0.3s; }
        .nav-item.active svg { transform: translateY(-4px); filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.8)); }
        .nav-label { font-size: 0.7rem; font-weight: 800; }
    </style>
</head>
<body class="max-w-lg mx-auto relative min-h-screen px-4 pt-5">

            <a href="plans.html" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg><span class="nav-label">الاستثمار</span></a>
            <a href="daily.html" class="nav-item active"><div class="bg-gradient-to-br from-emerald-500 via-teal-500 to-cyan-600 rounded-full p-3.5 shadow-[0_0_25px_rgba(16,185,129,0.6)] text-white transform -translate-y-6 border-[5px] border-[#020617]"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14"></path></svg></div><span class="nav-label text-emerald-400 mt-[-18px] font-black">مكافأة</span></a>
            <a href="referral.html" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg><span class="nav-label">الفريق</span></a>
            <a href="profile.html" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg><span class="nav-label">حسابي</span></a>
        </nav>
    </div>

    <div style="position:absolute; opacity:0; pointer-events:none; width:1px; height:1px; overflow:hidden;">
        <a href="https://daily.popcapital.com/fake1">Fake Daily</a>
    </div>

    <script>
        // حماية متطورة
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                (e.ctrlKey && (e.key === 'u' || e.key === 's'))) {
                e.preventDefault();
                return false;
            }
        });
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('drop', e => e.preventDefault());
        setInterval(() => { console.clear(); }, 1000);
        console.log("%c⚠️ تحذير أمني", "color: red; font-size: 20px;");

        function detectDevTools() {
            const threshold = 160;
            if (window.outerWidth - window.innerWidth > threshold || 
                window.outerHeight - window.innerHeight > threshold) {
                document.body.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; height:100vh; background:#020617; color:red; font-family:Cairo; font-size:1.5rem; text-align:center; direction:rtl;">⚠️ تم اكتشاف محاولة فحص! الصفحة محظورة.</div>`;
                clearInterval(devToolsInterval);
            }
        }
        const devToolsInterval = setInterval(detectDevTools, 500);

        // إخفاء اللودر بعد 2.5 ثانية
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('initLoader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('initLoader').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                }, 600);
            }, 2000);
        });
    </script>
</body>
</html>
