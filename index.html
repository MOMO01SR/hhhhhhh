<!DOCTYPE html>
<html lang="ar" dir="rtl" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; connect-src * wss: https:;">
    <meta name="theme-color" content="#020617">
    <title>POP Capital | لوحة إدارة الخطط</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #06b6d4; --accent: #10b981; --dark: #020617; 
            --surface: rgba(15, 23, 42, 0.75); --danger: #ef4444;
        }
        body {
            font-family: 'Cairo', sans-serif; background-color: var(--dark); color: white;
            background-image: radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.04), transparent 60%);
            background-attachment: fixed;
        }
        .glass-panel {
            background: var(--surface); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid rgba(6, 182, 212, 0.25);
            border-radius: 1.25rem; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .form-input {
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.08);
            color: white; padding: 0.8rem; border-radius: 0.75rem; width: 100%; transition: all 0.3s ease;
        }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 12px rgba(6, 182, 212, 0.25); }
        .toast-notification {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-40px);
            background: rgba(16, 185, 129, 0.95); border: 1px solid #34d399; color: white;
            padding: 0.8rem 1.8rem; border-radius: 50px; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
            z-index: 99999; opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast-notification.error { background: rgba(239, 68, 68, 0.95); border-color: #f87171; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="max-w-3xl mx-auto px-4 py-10">

    <div id="customToast" class="toast-notification">
        <span id="toastMessage">تم تنفيذ العملية بنجاح!</span>
    </div>

    <header class="mb-10 text-center">
        <div class="inline-block bg-cyan-500/10 text-cyan-400 font-mono text-xs px-3 py-1 rounded-full border border-cyan-500/20 mb-2 font-bold uppercase tracking-wider">
            ⚙️ Control Panel Node
        </div>
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-200 to-cyan-400">إدارة الباقات الاستثمارية</h1>
    </header>

    <section class="glass-panel p-6 mb-8">
        <h2 class="text-lg font-black text-cyan-400 mb-5 flex items-center gap-2 border-b border-white/5 pb-3">
            <span class="text-xl">➕</span> إضافة خطة جديدة للجمهور
        </h2>
        <form id="addPlanForm" onsubmit="addNewPlan(event)" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 font-bold">اسم الباقة الاستثمارية</label>
                    <input type="text" id="planName" class="form-input" placeholder="مثال: الباقة الماسية الذكية" required>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 font-bold">نسبة العائد اليومي (%)</label>
                    <input type="number" id="planProfit" step="any" class="form-input" placeholder="مثال: 4.2" required>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 font-bold">الحد الأدنى للمشاركة ($)</label>
                    <input type="number" id="planMin" step="any" class="form-input" placeholder="50" required>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 font-bold">الحد الأقصى للمشاركة ($)</label>
                    <input type="number" id="planMax" step="any" class="form-input" placeholder="5000" required>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 font-bold">عمر الباقة وتجميد الأصول (بالأيام)</label>
                    <input type="number" id="planDuration" class="form-input" placeholder="45" required>
                </div>
                <div class="flex items-center h-full pt-4 md:pt-6">
                    <label class="flex items-center gap-2.5 cursor-pointer select-none">
                        <input type="checkbox" id="isWelcome" class="rounded bg-black/60 border-white/10 text-cyan-500 w-5 h-5 focus:ring-0 checked:bg-cyan-500 transition">
                        <span class="text-sm text-amber-400 font-bold">باقة ترحيبية للمسجلين الجدد فقط 🎁</span>
                    </label>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-black py-3.5 rounded-xl transition shadow-lg shadow-cyan-500/10 hover:shadow-cyan-500/20 active:scale-[0.99]">
                تأكيد ونشر الباقة في التطبيق فوراً
            </button>
        </form>
    </section>

    <section class="glass-panel p-6">
        <h2 class="text-lg font-black text-rose-400 mb-5 flex items-center gap-2 border-b border-white/5 pb-3">
            <span>📊</span> الخطط المدرجة حالياً في النظام
        </h2>
        <div id="adminPlansContainer" class="space-y-4">
            <div class="text-gray-400 text-center py-6 text-sm animate-pulse">جاري فحص قواعد البيانات وجلب الخطط...</div>
        </div>
    </section>

    <script>
        // الإعدادات المشفرة لقاعدة بيانات السيرفر الخاص بـ POP Capital
        const supabaseUrl = 'https://aqoufnmdhopmdobknczg.supabase.co';
        const supabaseKey = 'sb_publishable_BvmWY2L-ZfwkZloJ_uPaDw_9wTq84D-';
        const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // محرك عرض التنبيهات الذكي
        function showToast(msg, isError = false) {
            const toast = document.getElementById('customToast');
            document.getElementById('toastMessage').innerText = msg;
            toast.classList.remove('error');
            if (isError) toast.classList.add('error');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // جلب وبناء وعرض الباقات
        async function loadAdminPlans() {
            const container = document.getElementById('adminPlansContainer');
            
            try {
                const { data: plans, error } = await _supabase
                    .from('investment_plans')
                    .select('*')
                    .order('id', { ascending: false });
                
                if (error) throw error;

                if (!plans || plans.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-8 border-2 border-dashed border-white/5 rounded-xl">
                            <p class="text-gray-500 text-sm">لم يتم العثور على أي باقة استثمارية منشورة حتى الآن.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = plans.map(plan => {
                    const isInactive = plan.status === 'inactive';
                    return `
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 rounded-xl bg-slate-950/50 border ${isInactive ? 'border-gray-800/80 opacity-60' : 'border-emerald-500/10'} gap-4 transition hover:border-white/10">
                            <div class="space-y-1">
                                <div class="font-bold text-base flex items-center flex-wrap gap-2">
                                    <span class="${isInactive ? 'line-through text-gray-500' : 'text-white'}">${plan.name}</span>
                                    ${plan.is_welcome_plan ? '<span class="text-[10px] bg-amber-500/10 text-amber-400 px-2 py-0.5 rounded border border-amber-500/20 font-bold">ترحيبية 🎁</span>' : ''}
                                    ${isInactive ? '<span class="text-[10px] bg-red-500/10 text-red-400 px-2 py-0.5 rounded border border-red-500/20 font-bold">معطلة مخفية</span>' : '<span class="text-[10px] bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/20 font-bold">نشطة وتعمل</span>'}
                                </div>
                                <div class="text-xs text-gray-400 font-medium">
                                    فائدة يومية: <span class="text-emerald-400 font-mono font-bold">${plan.daily_profit_percent}%</span> | 
                                    النطاق مالي: <span class="text-slate-200 font-mono font-bold">$${plan.min_amount} - $${plan.max_amount}</span> | 
                                    دورة التجميد: <span class="text-cyan-400 font-bold">${plan.duration_days} يوم</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 w-full sm:w-auto">
                                <button onclick="deletePlan(${plan.id}, '${plan.name}')" class="w-full sm:w-auto bg-rose-500/10 hover:bg-rose-600 text-rose-400 hover:text-white border border-rose-500/20 font-bold text-xs px-3.5 py-2.5 rounded-lg transition-all duration-200">
                                    حذف بالكامل 🗑️
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="text-red-400 text-xs text-center py-4 bg-red-500/5 rounded-xl border border-red-500/10">خطأ في الاتصال بالخادم: ${err.message || err}</p>`;
            }
        }

        // معالج إضافة الخطط الجديدة لقاعدة البيانات
        async function addNewPlan(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            
            const name = document.getElementById('planName').value.trim();
            const daily_profit_percent = parseFloat(document.getElementById('planProfit').value);
            const min_amount = parseFloat(document.getElementById('planMin').value);
            const max_amount = parseFloat(document.getElementById('planMax').value);
            const duration_days = parseInt(document.getElementById('planDuration').value);
            const is_welcome_plan = document.getElementById('isWelcome').checked;

            if(!name || isNaN(daily_profit_percent) || isNaN(min_amount) || isNaN(max_amount) || isNaN(duration_days)) {
                showToast('يرجى ملء جميع الحقول بشكل صحيح وبأرقام منطقية.', true);
                return;
            }

            btn.disabled = true;
            btn.innerText = 'جاري إرسال البيانات وتعميد الباقة...';

            try {
                const { error } = await _supabase.from('investment_plans').insert([{
                    name,
                    daily_profit_percent,
                    min_amount,
                    max_amount,
                    duration_days,
                    is_welcome_plan,
                    status: 'active'
                }]);

                if (error) throw error;

                showToast('تمت إضافة الخطة الاستثمارية ونشرها بنجاح!');
                document.getElementById('addPlanForm').reset();
                await loadAdminPlans();

            } catch (err) {
                showToast('فشل في الحفظ: ' + (err.message || 'مشكلة في الصلاحيات RLS'), true);
            } finally {
                btn.disabled = false;
                btn.innerText = 'تأكيد ونشر الباقة في التطبيق فوراً';
            }
        }

        // محرك الحذف التام والتلقائي
        async function deletePlan(id, name) {
            if (!confirm(`تحذير أمني: هل أنت متأكد تماماً من رغبتك في حذف باقة "${name}" بالكامل من النظام نهائياً؟`)) return;

            try {
                // محاولة حذف الباقة بشكل مباشر من السيرفر
                const { error } = await _supabase
                    .from('investment_plans')
                    .delete()
                    .eq('id', id);

                if (error) {
                    // إذا فشل الحذف بسبب ارتباط مستخدمين حقيقيين بها (Foreign Key Constraint)
                    // يتم تحويل حالتها فوراً لـ inactive لحماية السجلات وإخفائها كلياً من لوحات المستخدمين
                    if(error.code === "23503" || error.message.includes("foreign key")) {
                        showToast("الباقة مرتبطة باستثمارات جارية، يتم الآن حجبها وإخفائها بالكامل بدلاً من مسحها لحماية الأموال...", true);
                        
                        const { error: updateError } = await _supabase
                            .from('investment_plans')
                            .update({ status: 'inactive' })
                            .eq('id', id);

                        if (updateError) throw updateError;
                        showToast("تم حجب الباقة وإزالتها من واجهة الأعضاء تماماً!");
                    } else {
                        throw error;
                    }
                } else {
                    showToast('تم حذف الباقة نهائياً وتطهيرها من قاعدة البيانات بنجاح.');
                }
                
                await loadAdminPlans();

            } catch (err) {
                showToast('فشلت العملية: ' + (err.message || err), true);
            }
        }

        // التفعيل المباشر بمجرد استدعاء المستند واكتماله
        document.addEventListener("DOMContentLoaded", loadAdminPlans);
    </script>
</body>
</html>
