<!DOCTYPE html>
<html lang="ar" dir="rtl" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP Capital | إدارة خطط الاستثمار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #06b6d4; --accent: #10b981; --dark: #020617; 
            --surface: rgba(11, 19, 43, 0.75); --danger: #ef4444;
        }
        body {
            font-family: 'Cairo', sans-serif; background-color: var(--dark); color: white;
            background-image: radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.05), transparent 50%);
            background-attachment: fixed;
        }
        .glass-panel {
            background: var(--surface); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06); border-top: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 1.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .form-input {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 0.75rem; border-radius: 0.75rem; width: 100%; transition: all 0.3s;
        }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px rgba(6, 182, 212, 0.2); }
        .toast-notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-30px);
            background: rgba(16, 185, 129, 0.95); border: 1px solid #34d399; color: white;
            padding: 0.8rem 1.5rem; border-radius: 2rem; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            z-index: 99999; opacity: 0; pointer-events: none; transition: all 0.4s;
        }
        .toast-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast-notification.error { background: rgba(239, 68, 68, 0.95); border-color: #f87171; }
    </style>
</head>
<body class="max-w-2xl mx-auto px-4 py-8">

<div id="customToast" class="toast-notification">
    <span id="toastMessage">تمت العملية بنجاح!</span>
</div>

<header class="mb-8 text-center">
    <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-cyan-400">لوحة تحكم الباقات</h1>
    <p class="text-xs text-cyan-400 font-mono tracking-widest mt-1">INVESTMENT PLANS MANAGEMENT</p>
</header>

<section class="glass-panel p-6 mb-8">
    <h2 class="text-lg font-black text-cyan-400 mb-4 flex items-center gap-2">
        <span>➕ إضافة باقة استثمارية جديدة</span>
    </h2>
    <form id="addPlanForm" onsubmit="addNewPlan(event)" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs text-gray-400 mb-1">اسم الباقة</label>
                <input type="text" id="planName" class="form-input" placeholder="مثال: الخطة الفضية" required>
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">الربح اليومي (%)</label>
                <input type="number" id="planProfit" step="any" class="form-input" placeholder="مثال: 3.5" required>
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">الحد الأدنى للاستثمار ($)</label>
                <input type="number" id="planMin" step="any" class="form-input" placeholder="10" required>
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">الحد الأقصى للاستثمار ($)</label>
                <input type="number" id="planMax" step="any" class="form-input" placeholder="1000" required>
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">مدة الاستثمار (بالأيام)</label>
                <input type="number" id="planDuration" class="form-input" placeholder="30" required>
            </div>
            <div class="flex items-center h-full pt-6">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="isWelcome" class="rounded bg-black border-gray-600 text-cyan-500 w-5 h-5 focus:ring-0">
                    <span class="text-sm text-amber-400 font-bold">باقة ترحيبية (تستخدم مرة واحدة) 🎁</span>
                </label>
            </div>
        </div>
        <button type="submit" class="w-100 w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 font-black py-3 rounded-xl mt-2 transition shadow-lg shadow-cyan-500/20">
            حفظ ونشر الباقة فوراً
        </button>
    </form>
</section>

<section class="glass-panel p-6">
    <h2 class="text-lg font-black text-rose-400 mb-4">📊 الباقات الحالية وإدارتها</h2>
    <div id="adminPlansContainer" class="space-y-3">
        <p class="text-gray-400 text-center py-4 text-sm animate-pulse">جاري تحميل الباقات المتوفرة...</p>
    </div>
</section>

<script>
    // الإعدادات الخاصة بـ Supabase من الكود الأصلي
    const supabaseUrl = 'https://aqoufnmdhopmdobknczg.supabase.co';
    const supabaseKey = 'sb_publishable_BvmWY2L-ZfwkZloJ_uPaDw_9wTq84D-';
    const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    function showToast(msg, isError = false) {
        const t = document.getElementById('customToast');
        document.getElementById('toastMessage').innerText = msg;
        t.classList.remove('error');
        if (isError) t.classList.add('error');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // جلب الباقات وعرضها
    async function loadAdminPlans() {
        const container = document.getElementById('adminPlansContainer');
        const { data: plans, error } = await _supabase.from('investment_plans').select('*').order('id', { ascending: false });
        
        if (error) {
            container.innerHTML = `<p class="text-red-400 text-sm text-center">حدث خطأ أثناء جلب البيانات.</p>`;
            return;
        }

        if (!plans || plans.length === 0) {
            container.innerHTML = `<p class="text-gray-400 text-sm text-center py-4">لا توجد باقات مضافة حالياً.</p>`;
            return;
        }

        container.innerHTML = plans.map(plan => `
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 rounded-xl bg-slate-950/60 border ${plan.status === 'active' ? 'border-emerald-500/20' : 'border-gray-800'} gap-4">
                <div>
                    <div class="font-bold text-md flex items-center gap-2">
                        <span>${plan.name}</span>
                        ${plan.is_welcome_plan ? '<span class="text-xs bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded-md font-bold">ترحيبية</span>' : ''}
                        ${plan.status !== 'active' ? '<span class="text-xs bg-gray-500/20 text-gray-400 px-2 py-0.5 rounded-md">معطلة</span>' : ''}
                    </div>
                    <div class="text-xs text-gray-400 mt-1">
                        الربح: <span class="text-emerald-400 font-mono font-bold">${plan.daily_profit_percent}%</span> | 
                        المدى: <span class="text-white font-bold">${plan.min_amount}$ - ${plan.max_amount}$</span> | 
                        المدة: <span class="text-cyan-400 font-bold">${plan.duration_days} يوم</span>
                    </div>
                </div>
                <button onclick="deletePlan(${plan.id}, '${plan.name}')" class="w-full sm:w-auto bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white border border-red-500/30 font-bold text-xs px-4 py-2 rounded-lg transition-all duration-300">
                    حذف بالكامل 🗑️
                </button>
            </div>
        `).join('');
    }

    // إضافة باقة جديدة
    async function addNewPlan(e) {
        e.preventDefault();
        
        const name = document.getElementById('planName').value;
        const daily_profit_percent = parseFloat(document.getElementById('planProfit').value);
        const min_amount = parseFloat(document.getElementById('planMin').value);
        const max_amount = parseFloat(document.getElementById('planMax').value);
        const duration_days = parseInt(document.getElementById('planDuration').value);
        const is_welcome_plan = document.getElementById('isWelcome').checked;

        const { data, error } = await _supabase.from('investment_plans').insert({
            name: name,
            daily_profit_percent: daily_profit_percent,
            min_amount: min_amount,
            max_amount: max_amount,
            duration_days: duration_days,
            is_welcome_plan: is_welcome_plan,
            status: 'active'
        });

        if (error) {
            showToast('فشل إضافة الباقة: ' + error.message, true);
        } else {
            showToast('تمت إضافة ونشر الباقة بنجاح!');
            document.getElementById('addPlanForm').reset();
            loadAdminPlans();
        }
    }

    // حذف الباقة بالكامل
    async function deletePlan(id, name) {
        if (!confirm(`هل أنت متأكد تماماً من حذف باقة "${name}" بشكل نهائي من النظام؟`)) return;

        const { error } = await _supabase.from('investment_plans').delete().eq('id', id);

        if (error) {
            showToast('فشل حذف الباقة: ' + error.message, true);
        } else {
            showToast('تم حذف الباقة بنجاح من قاعدة البيانات.');
            loadAdminPlans();
        }
    }

    // التشغيل عند فتح الصفحة
    window.onload = loadAdminPlans;
</script>
</body>
</html>
