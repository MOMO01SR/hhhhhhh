<!DOCTYPE html>
<html lang="ar" dir="rtl" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net https://*.supabase.co">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --primary: #06b6d4; --accent: #10b981; --dark: #020617; 
            --surface: rgba(11, 19, 43, 0.75); --danger: #ef4444; --purple: #a855f7;
            --gold: #fbbf24;
        }
        * { user-select: none; -webkit-user-select: none; -webkit-user-drag: none; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif; background-color: var(--dark); color: white; margin: 0;
            background-image: 
                radial-gradient(circle at 10% 15%, rgba(6, 182, 212, 0.08), transparent 40%),
                radial-gradient(circle at 90% 85%, rgba(16, 185, 129, 0.05), transparent 40%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 10px);
            background-attachment: fixed; padding-bottom: 7rem; overflow-x: hidden;
        }
        @media print { body { display: none; } }

        #initLoader { 
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(20px); z-index: 99999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .square-loader {
            width: 90px; height: 90px; background: rgba(6, 182, 212, 0.03);
            border: 2px solid rgba(6, 182, 212, 0.3); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.15);
            animation: squarePulse 2.5s ease-in-out infinite alternate;
        }
        @keyframes squarePulse {
            0% { box-shadow: 0 0 15px rgba(6, 182, 212, 0.15); }
            100% { box-shadow: 0 0 40px rgba(6, 182, 212, 0.5); }
        }
        .circle-spinner {
            width: 55px; height: 55px; border-radius: 50%; border: 3px solid transparent;
            border-top-color: var(--primary); border-right-color: var(--accent);
            border-bottom-color: var(--purple); border-left-color: rgba(255,255,255,0.2);
            animation: spinClockwise 1s linear infinite;
        }
        @keyframes spinClockwise { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .terminal-status { font-family: monospace; color: var(--primary); font-size: 0.8rem; letter-spacing: 3px; margin-top: 2rem; font-weight: bold; text-shadow: 0 0 10px rgba(6, 182, 212, 0.4); }

        #mainApp { display: none; width: 100%; animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-panel {
            background: var(--surface); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.06); border-top: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 2rem; box-shadow: 0 35px 65px rgba(0,0,0,0.8), inset 0 2px 0px rgba(255,255,255,0.05);
            position: relative; overflow: hidden;
        }

        .plan-card {
            background: rgba(4, 9, 26, 0.65); border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 1.5rem; padding: 1.5rem; transition: border-color 0.3s; text-align: center;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .plan-card:hover { border-color: rgba(6, 182, 212, 0.4); }
        .plan-card.featured { border-color: rgba(16, 185, 129, 0.4); background: rgba(16, 185, 129, 0.05); }
        .plan-card.welcome { border-color: rgba(245, 158, 11, 0.4); background: rgba(245, 158, 11, 0.05); }

        .plan-title { font-weight: 900; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .plan-profit { font-family: monospace; font-weight: 900; font-size: 1.5rem; color: var(--accent); }
        .plan-detail { font-size: 0.75rem; color: #94a3b8; margin: 0.5rem 0; }

        .invest-btn {
            background: linear-gradient(90deg, #06b6d4, #2563eb); color: white; font-weight: 800;
            padding: 0.8rem; border-radius: 0.9rem; margin-top: 1rem; transition: all 0.3s;
            border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; width: 100%;
            box-shadow: 0 10px 20px rgba(6, 182, 212, 0.2);
        }
        .invest-btn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
        .invest-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4); }

        .balance-bar {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 1rem; padding: 0.8rem 1.2rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;
        }
        .active-investment {
            background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 1rem; padding: 1rem; margin-bottom: 0.8rem; font-size: 0.8rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .countdown { font-family: monospace; font-size: 0.7rem; color: #fbbf24; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 512px; background: rgba(2, 6, 15, 0.95); backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2.5rem 2.5rem 0 0;
            display: flex; justify-content: space-around; align-items: center;
            padding: 1rem 0.5rem 1.5rem 0.5rem; z-index: 1000;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.7);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; color: #6b7280; text-decoration: none; transition: all 0.3s; width: 20%; }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 24px; height: 24px; transition: all 0.3s; }
        .nav-item.active svg { transform: translateY(-4px); filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.8)); }
        .nav-label { font-size: 0.7rem; font-weight: 800; }

        /* نافذة الاستثمار المنبثقة */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 10000; display: none; align-items: center; justify-content: center; padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: linear-gradient(145deg, #0f172a, #020617);
            border: 1px solid rgba(6, 182, 212, 0.3); border-radius: 2rem;
            width: 100%; max-width: 380px; padding: 2rem 1.5rem; text-align: center;
            transform: scale(0.9); transition: transform 0.3s;
        }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-input {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 0.9rem; border-radius: 0.8rem; font-family: monospace;
            width: 100%; font-size: 1.1rem; text-align: center; margin: 0.8rem 0;
        }
        .modal-input:focus { outline: none; border-color: var(--primary); }
        .quick-btn {
            background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.3);
            color: var(--primary); padding: 0.4rem 0.8rem; border-radius: 0.5rem;
            font-size: 0.7rem; font-weight: 800; cursor: pointer; margin: 0.2rem;
        }
        .quick-btn:hover { background: rgba(6,182,212,0.2); }
        .modal-close {
            position: absolute; top: 1rem; left: 1rem; background: none; border: none;
            color: #94a3b8; font-size: 1.5rem; cursor: pointer;
        }

        .toast-notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-30px);
            background: rgba(16, 185, 129, 0.95); border: 1px solid #34d399;
            color: white; font-weight: 800; padding: 0.8rem 1.5rem; border-radius: 2rem;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4); backdrop-filter: blur(10px);
            z-index: 99999; opacity: 0; pointer-events: none; transition: all 0.4s;
            display: flex; align-items: center; justify-content: center; gap: 0.6rem;
        }
        .toast-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast-notification.error { background: rgba(239, 68, 68, 0.95); border-color: #f87171; }
    </style>
</head>

<script>
    const supabaseUrl = 'https://aqoufnmdhopmdobknczg.supabase.co';
    const supabaseKey = 'VTJGc2RHVmtYMTlWbVJNd05UTmZSMVpPZEZwaU1VcHpaV3g2VlhSck5VWXpVbTVYVWxwUGNWcEZXazFTYm5wV1RtMTBOMVpyVW10U1ZrSlVUV3BCTVZscmVGWk9SMHBaV1MxU1IxWnFTV2M5UFEwSg==
';
    const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', function(e) { if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key==='I'||e.key==='J'||e.key==='C')) || (e.ctrlKey && (e.key==='u'||e.key==='s'))) { e.preventDefault(); } });
    document.addEventListener('dragstart', e => e.preventDefault()); document.addEventListener('drop', e => e.preventDefault());
    setInterval(() => console.clear(), 1000);

    function showToast(msg, isError = false) {
        const t = document.getElementById('customToast');
        document.getElementById('toastMessage').innerText = msg;
        t.classList.remove('error');
        if (isError) t.classList.add('error');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    let userProfile = null, allPlans = [], activeInvestments = [], countdownIntervals = {};
    let selectedPlanId = null;

    function openInvestModal(planId) {
        const plan = allPlans.find(p => p.id === planId);
        if (!plan) return;
        if (plan.is_welcome_plan && userProfile.has_used_welcome_plan) {
            showToast('لقد استخدمت الباقة الترحيبية مسبقاً.', true);
            return;
        }
        selectedPlanId = planId;
        document.getElementById('modalPlanName').innerText = plan.name;
        document.getElementById('modalPlanProfit').innerText = plan.daily_profit_percent + '% يومياً';
        document.getElementById('modalPlanDuration').innerText = plan.duration_days + ' يوم';
        document.getElementById('modalAmount').value = '';
        document.getElementById('investModal').classList.add('active');
    }

    function closeInvestModal() {
        document.getElementById('investModal').classList.remove('active');
        selectedPlanId = null;
    }

    function setModalAmount(type) {
        const plan = allPlans.find(p => p.id === selectedPlanId);
        if (!plan) return;
        const input = document.getElementById('modalAmount');
        if (type === 'min') input.value = plan.min_amount;
        else if (type === 'max') input.value = plan.max_amount;
        else if (type === 'balance') input.value = parseFloat(userProfile.balance || 0).toFixed(2);
    }

    async function confirmInvest() {
        const plan = allPlans.find(p => p.id === selectedPlanId);
        if (!plan) return;
        const amount = parseFloat(document.getElementById('modalAmount').value);
        if (!amount || amount < plan.min_amount || amount > plan.max_amount) {
            showToast(`المبلغ يجب أن يكون بين $${plan.min_amount} و $${plan.max_amount}`, true);
            return;
        }
        if (amount > parseFloat(userProfile.balance || 0)) {
            showToast('رصيدك غير كافٍ. انتقل إلى صفحة الشحن.', true);
            setTimeout(() => { window.location.href = 'deposit.html'; }, 2000);
            return;
        }

        closeInvestModal();
        // تنفيذ الاستثمار
        const newBalance = parseFloat(userProfile.balance) - amount;
        const { error: balanceError } = await _supabase.from('users_profiles').update({ balance: newBalance, has_used_welcome_plan: plan.is_welcome_plan ? true : userProfile.has_used_welcome_plan }).eq('email', userProfile.email);
        if (balanceError) { showToast('فشل تحديث الرصيد', true); return; }
        const dailyProfit = amount * (plan.daily_profit_percent / 100);
        const endDate = new Date(); endDate.setDate(endDate.getDate() + plan.duration_days);
        const { error: investError } = await _supabase.from('active_investments').insert({ user_email: userProfile.email, plan_id: plan.id, amount: amount, daily_profit: dailyProfit, start_date: new Date().toISOString(), end_date: endDate.toISOString(), last_profit_claim: null, status: 'active' });
        if (investError) { showToast('فشل إنشاء الاستثمار', true); return; }
        userProfile.balance = newBalance; if (plan.is_welcome_plan) userProfile.has_used_welcome_plan = true;
        localStorage.setItem('user_session_plain', JSON.stringify(userProfile));
        showToast('تم تفعيل الباقة بنجاح! سيبدأ استلام الأرباح بعد 24 ساعة.');
        setTimeout(() => location.reload(), 1500);
    }

    function startCountdown(invId, nextClaimTime) {
        const el = document.getElementById('countdown-' + invId);
        if (!el) return;
        function update() {
            const now = new Date().getTime();
            const distance = nextClaimTime - now;
            if (distance <= 0) { el.innerText = 'جاهز للاستلام'; clearInterval(countdownIntervals[invId]); return; }
            const h = Math.floor(distance / (1000*60*60));
            const m = Math.floor((distance % (1000*60*60)) / (1000*60));
            const s = Math.floor((distance % (1000*60)) / 1000);
            el.innerText = `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
        update();
        countdownIntervals[invId] = setInterval(update, 1000);
    }

    async function init() {
        const session = JSON.parse(localStorage.getItem('user_session_plain'));
        if (!session) { window.location.href='login.html'; return; }
        const { data: profile } = await _supabase.from('users_profiles').select('*').eq('email', session.email).maybeSingle();
        if (!profile || profile.status !== 'active') { localStorage.removeItem('user_session_plain'); window.location.href='login.html'; return; }
        userProfile = profile;
        const { data: plans } = await _supabase.from('investment_plans').select('*').eq('status', 'active').order('id');
        allPlans = plans || [];
        const { data: investments } = await _supabase.from('active_investments').select('*').eq('user_email', userProfile.email).eq('status', 'active');
        activeInvestments = investments || [];
        document.getElementById('headerBalance').innerText = parseFloat(userProfile.balance || 0).toFixed(2);
        document.getElementById('plansCount').innerText = allPlans.length + ' خطط';
        renderActiveInvestments();
        renderPlans();
        setTimeout(() => {
            document.getElementById('initLoader').style.opacity = '0';
            setTimeout(() => { document.getElementById('initLoader').style.display = 'none'; document.getElementById('mainApp').style.display = 'block'; }, 600);
        }, 1500);
    }

    function renderActiveInvestments() {
        const section = document.getElementById('activeInvestmentsSection');
        const list = document.getElementById('activeInvestmentsList');
        if (activeInvestments.length === 0) { section.classList.add('hidden'); return; }
        section.classList.remove('hidden');
        list.innerHTML = activeInvestments.map(inv => {
            const plan = allPlans.find(p => p.id === inv.plan_id);
            const nextClaim = new Date(inv.last_profit_claim || inv.start_date);
            nextClaim.setHours(nextClaim.getHours() + 24);
            const canClaimNow = new Date() >= nextClaim;
            const nextClaimTime = nextClaim.getTime();
            return `<div class="active-investment">
                <div><span class="font-bold text-white">${plan?.name || 'خطة'}</span><span class="text-gray-400 text-xs mr-2">$${parseFloat(inv.amount).toFixed(2)}</span></div>
                <div class="flex items-center gap-3">
                    <span class="countdown" id="countdown-${inv.id}"></span>
                    ${canClaimNow ? `<button onclick="claimProfit(${inv.id})" class="bg-emerald-600 text-white px-3 py-1 rounded-lg text-xs font-bold">استلام الربح</button>` : ''}
                </div>
            </div>`;
        }).join('');
        activeInvestments.forEach(inv => {
            const nextClaim = new Date(inv.last_profit_claim || inv.start_date);
            nextClaim.setHours(nextClaim.getHours() + 24);
            if (new Date() < nextClaim) startCountdown(inv.id, nextClaim.getTime());
        });
    }

    function renderPlans() {
        const container = document.getElementById('plansContainer');
        container.innerHTML = allPlans.map(plan => {
            let cardClass = 'plan-card';
            if (plan.is_welcome_plan) cardClass += ' welcome';
            else if (plan.daily_profit_percent >= 4) cardClass += ' featured';
            const isWelcomeUsed = plan.is_welcome_plan && userProfile.has_used_welcome_plan;
            const btnDisabled = isWelcomeUsed ? 'disabled' : '';
            const btnText = isWelcomeUsed ? 'تم الاستخدام' : 'استثمر الآن';
            const btnStyle = isWelcomeUsed ? 'style="background:#1e293b;color:#475569;cursor:not-allowed"' : '';
            return `<div class="${cardClass}">
                <div>
                    <div class="plan-title ${plan.is_welcome_plan ? 'text-amber-400' : plan.daily_profit_percent >= 4 ? 'text-purple-400' : 'text-cyan-400'}">${plan.name} ${plan.is_welcome_plan ? '🎁' : ''}</div>
                    <div class="plan-profit">${plan.daily_profit_percent}% <span class="text-sm text-gray-400">يومياً</span></div>
                    <p class="plan-detail">الحد الأدنى: <span class="text-white font-bold">$${plan.min_amount}</span> | الأقصى: <span class="text-white font-bold">$${plan.max_amount}</span></p>
                    <p class="plan-detail">المدة: <span class="text-white font-bold">${plan.duration_days} يوم</span></p>
                </div>
                <button class="invest-btn" ${btnStyle} ${btnDisabled} onclick="openInvestModal(${plan.id})">${btnText}</button>
            </div>`;
        }).join('');
    }

    async function claimProfit(investmentId) {
        const inv = activeInvestments.find(i => i.id === investmentId);
        if (!inv) return;
        const nextClaim = new Date(inv.last_profit_claim || inv.start_date); nextClaim.setHours(nextClaim.getHours() + 24);
        if (new Date() < nextClaim) { showToast('لم يحن موعد استلام الربح بعد.', true); return; }
        const profit = parseFloat(inv.daily_profit);
        const newBalance = parseFloat(userProfile.balance) + profit;
        const { error } = await _supabase.from('users_profiles').update({ balance: newBalance }).eq('email', userProfile.email);
        if (error) { showToast('فشل إضافة الربح', true); return; }
        await _supabase.from('active_investments').update({ last_profit_claim: new Date().toISOString() }).eq('id', investmentId);
        userProfile.balance = newBalance; localStorage.setItem('user_session_plain', JSON.stringify(userProfile));
        showToast(`تم إضافة $${profit.toFixed(2)} إلى رصيدك القابل للسحب.`);
        setTimeout(() => location.reload(), 1500);
    }

    window.onload = init;
</script>
</body>
</html>
