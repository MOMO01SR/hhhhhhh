    <style>
        :root {
            --primary: #06b6d4; --accent: #10b981; --dark: #020617; 
            --surface: rgba(11, 19, 43, 0.75); --danger: #ef4444; --purple: #a855f7;
            --proxy-color: #3b82f6;
        }

        * { user-select: none; -webkit-user-select: none; -webkit-user-drag: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark); color: white; margin: 0;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(168, 85, 247, 0.08), transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.05), transparent 40%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 10px);
            background-attachment: fixed; padding-bottom: 7rem; overflow-x: hidden;
        }

        @media print { body { display: none; } }

        #initLoader { 
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(20px); z-index: 99999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .square-loader {
            width: 90px; height: 90px;
            background: rgba(168, 85, 247, 0.03); border: 2px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.15);
            animation: squarePulse 2.5s ease-in-out infinite alternate;
        }
        @keyframes squarePulse {
            0% { box-shadow: 0 0 15px rgba(168, 85, 247, 0.15); }
            100% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.5); }
        }
        .circle-spinner {
            width: 55px; height: 55px; border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--purple); border-right-color: var(--primary);
            border-bottom-color: var(--proxy-color); border-left-color: rgba(255,255,255,0.2);
            animation: spinClockwise 1s linear infinite;
        }
        @keyframes spinClockwise { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .terminal-status { 
            font-family: monospace; color: var(--purple); font-size: 0.8rem; 
            letter-spacing: 3px; text-transform: uppercase; margin-top: 2rem; 
            text-align: center; font-weight: bold; text-shadow: 0 0 10px rgba(168, 85, 247, 0.4); 
        }

        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(168, 85, 247, 0.5); box-shadow: 0 0 15px rgba(168, 85, 247, 0.8);
            animation: scan 3s linear infinite; z-index: 9998; pointer-events: none;
        }
        @keyframes scan { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }

        #mainApp { display: none; width: 100%; animation: fadeIn 0.8s ease forwards; position: relative; z-index: 10; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-panel {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 15, 0.95));
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(168, 85, 247, 0.3); border-radius: 2rem;
            box-shadow: 0 35px 65px rgba(0,0,0,0.8), inset 0 2px 0px rgba(255,255,255,0.05);
            position: relative; overflow: hidden;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; margin-bottom: 1.5rem; }
        .stat-card {
            background: rgba(4, 9, 26, 0.65); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1.5rem; padding: 1.2rem; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); border-top: 1px solid rgba(168, 85, 247, 0.2);
        }
        .stat-val { font-family: monospace; font-weight: 900; font-size: 1.5rem; margin-top: 0.3rem; }

        .copy-box {
            background: rgba(0,0,0,0.6); border: 1px dashed rgba(168, 85, 247, 0.4);
            border-radius: 1rem; padding: 0.5rem; display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.2rem; transition: 0.3s;
        }
        .copy-box:focus-within { border-color: var(--purple); background: rgba(168, 85, 247, 0.05); }
        .copy-input {
            background: transparent; border: none; color: white; font-family: monospace;
            font-size: 0.85rem; width: 100%; outline: none; padding-right: 0.5rem; letter-spacing: 1px;
        }
        .copy-btn {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(168, 85, 247, 0.5)); 
            color: white; padding: 0.7rem 1.2rem; border-radius: 0.8rem; font-weight: 800; font-size: 0.7rem;
            transition: all 0.3s; display: flex; align-items: center; gap: 0.3rem; 
            border: 1px solid rgba(168,85,247,0.5); cursor: pointer; white-space: nowrap;
        }
        .copy-btn:hover { background: var(--purple); box-shadow: 0 0 15px rgba(168,85,247,0.4); transform: scale(1.05); }

        .share-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; margin-top: 0.5rem; }
        .share-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.9rem; border-radius: 1rem; font-weight: 800; font-size: 0.8rem;
            text-decoration: none; transition: 0.3s; border: 1px solid transparent;
        }
        .share-telegram { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border-color: rgba(56, 189, 248, 0.2); }
        .share-whatsapp { background: rgba(34, 197, 94, 0.1); color: #22c55e; border-color: rgba(34, 197, 94, 0.2); }

        .tier-container { display: flex; flex-direction: column; gap: 0.6rem; }
        .tier-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.03);
            border-radius: 1.2rem; position: relative; overflow: hidden;
        }
        .tier-row::before { 
            content: ''; position: absolute; right: 0; top: 0; bottom: 0; 
            width: 4px; background: var(--purple); 
        }
        .tier-badge { 
            background: rgba(168, 85, 247, 0.15); border: 1px solid rgba(168, 85, 247, 0.3); 
            color: #c084fc; padding: 0.3rem 0.8rem; border-radius: 0.6rem; 
            font-size: 0.8rem; font-weight: 900; font-family: monospace; 
        }

        .toast-notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-30px);
            background: rgba(168, 85, 247, 0.95); border: 1px solid #d8b4fe;
            color: white; font-weight: 800; padding: 0.8rem 1.5rem; border-radius: 2rem;
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.4); backdrop-filter: blur(10px);
            z-index: 99999; opacity: 0; pointer-events: none; transition: all 0.4s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .toast-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 512px; background: rgba(2, 6, 15, 0.95); backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2.5rem 2.5rem 0 0;
            display: flex; justify-content: space-around; align-items: center;
            padding: 1rem 0.5rem 1.5rem 0.5rem; z-index: 1000;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.7);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; color: #6b7280; text-decoration: none; transition: all 0.3s; width: 20%; }
        .nav-item.active { color: var(--purple); }
        .nav-item svg { width: 24px; height: 24px; transition: all 0.3s; }
        .nav-item.active svg { transform: translateY(-4px); filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.8)); }
        .nav-label { font-size: 0.7rem; font-weight: 800; }
    </style>

                        <h4 class="text-xs font-bold text-white opacity-80">مستوى 2 (غير مباشر)</h4>
                        <p class="text-[9px] text-gray-400 mt-1">${tier2Required > 0 ? `تحتاج ${tier2Required} مشتركين` : 'مدعوون من فريقك'}</p>
                    </div>
                    <div class="tier-badge opacity-80">${tier2Percent}%</div>
                </div>
                <div class="tier-row">
                    <div>
                        <h4 class="text-xs font-bold text-white opacity-60">مستوى 3 (أجيال)</h4>
                        <p class="text-[9px] text-gray-400 mt-1">${tier3Required > 0 ? `تحتاج ${tier3Required} مشتركين` : 'مدعوون من المستوى الثاني'}</p>
                    </div>
                    <div class="tier-badge opacity-60">${tier3Percent}%</div>
                </div>
            `;
        }

        async function secureProxyAuth() {
            activateCurrentNavigationTab();
            const localSession = localStorage.getItem('user_session_plain');
            if (!localSession || !_supabase) { clearInterval(bootInterval); window.location.replace('login.html'); return; }
            const parsedUser = JSON.parse(localSession);

            try {
                const { data: profile, error } = await _supabase.from('users_profiles').select('*').eq('email', parsedUser.email).maybeSingle();
                if (error || !profile || profile.status !== 'active') {
                    localStorage.removeItem('user_session_plain');
                    clearInterval(bootInterval);
                    window.location.replace('login.html');
                    return;
                }

                userProfileData = profile;
                localStorage.setItem('user_session_plain', JSON.stringify(profile));

                let myInviteCode = profile.invite_code;
                if (!myInviteCode || myInviteCode.trim() === "") {
                    myInviteCode = String(Math.floor(10000 + Math.random() * 90000));
                    await _supabase.from('users_profiles').update({ invite_code: myInviteCode }).eq('email', profile.email);
                    profile.invite_code = myInviteCode;
                    localStorage.setItem('user_session_plain', JSON.stringify(profile));
                }

                // جلب جميع الإعدادات
                const { data: settings } = await _supabase.from('system_settings').select('*');

                // بناء هيكلية العمولات من الإعدادات
                if (settings) buildTierStructure(settings);

                // جلب رابط التسجيل الأساسي
                let baseRegisterUrl = 'register.html';
                if (settings) {
                    const baseUrlSetting = settings.find(s => s.key === 'base_register_url');
                    if (baseUrlSetting && baseUrlSetting.value) baseRegisterUrl = baseUrlSetting.value;
                }

                const fullLink = baseRegisterUrl.includes('http') 
                    ? `${baseRegisterUrl}?invite_code=${myInviteCode}`
                    : `${window.location.origin}/${baseRegisterUrl}?invite_code=${myInviteCode}`;

                document.getElementById('referralCodeInput').value = myInviteCode;
                document.getElementById('referralLinkInput').value = fullLink;
                document.getElementById('teamCommissions').innerText = parseFloat(profile.total_commissions || 0).toFixed(2);
                document.getElementById('proxyNodeInfo').innerText = "PROXY: " + proxyNodes[Math.floor(Math.random() * proxyNodes.length)];

                updateShareLinks(fullLink, myInviteCode);

                const { count } = await _supabase.from('users_profiles').select('*', { count: 'exact', head: true }).eq('referred_by', myInviteCode);
                document.getElementById('teamSize').innerText = count || 0;

                setTimeout(() => {
                    clearInterval(bootInterval);
                    const loader = document.getElementById('initLoader');
                    if(loader) { loader.style.opacity = '0'; setTimeout(() => { loader.style.display = 'none'; document.getElementById('mainApp').style.display = 'block'; }, 800); }
                }, 5000);

            } catch (err) { console.error(err); clearInterval(bootInterval); window.location.replace('login.html'); }
        }

        function updateShareLinks(link, code) {
            const msg = encodeURIComponent(`انضم إلى POP Capital واحصل على أرباح قوية! كود الإحالة: ${code}\nالرابط: ${link}`);
            document.getElementById('shareTelegram').href = `https://t.me/share/url?url=${link}&text=${msg}`;
            document.getElementById('shareWhatsapp').href = `https://api.whatsapp.com/send?text=${msg}`;
        }

        function showToast(message) {
            const toast = document.getElementById('customToast');
            document.getElementById('toastMessage').innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function copyData(elementId, typeName) {
            const inputElement = document.getElementById(elementId);
            if (!inputElement) return;
            const value = inputElement.value;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(value).then(() => showToast(`تم نسخ ${typeName} بنجاح!`)).catch(() => {
                    inputElement.select(); inputElement.setSelectionRange(0, 99999); document.execCommand('copy'); showToast(`تم نسخ ${typeName} بنجاح!`);
                });
            } else {
                inputElement.select(); inputElement.setSelectionRange(0, 99999); document.execCommand('copy'); showToast(`تم نسخ ${typeName} بنجاح!`);
            }
            window.getSelection().removeAllRanges();
        }

        window.onload = secureProxyAuth;
    </script>
</body>
